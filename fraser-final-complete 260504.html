// ─── PERSISTENT TIMER SERVICE ─────────────────────────────────────────────────
// Timers are stored in localStorage under a single key so they survive page
// reloads, tab switches, and PWA suspends. A global tick loop runs whenever
// the app is foregrounded, re-deriving remaining time from absolute endsAt
// timestamps. When a timer expires while the app is active, we play an alarm
// and try a browser notification. Background expiry won't trigger sound (web
// platform limitation) but the timer state remains accurate when you return.

const PERSISTENT_TIMERS_KEY = 'fraser_persistent_timers';

const PersistentTimers = {
  // In-memory cache; localStorage is the source of truth
  list: [],
  tickIntervalId: null,
  listeners: [],

  load() {
    try {
      const raw = localStorage.getItem(PERSISTENT_TIMERS_KEY);
      this.list = raw ? JSON.parse(raw) : [];
    } catch(e) { this.list = []; }
  },

  save() {
    try { localStorage.setItem(PERSISTENT_TIMERS_KEY, JSON.stringify(this.list)); } catch(e) {}
  },

  add(label, mealName, durationSec, stepKey) {
    this.load();
    // Don't duplicate — if a timer with the same stepKey is already running, return it
    if (stepKey) {
      const existing = this.list.find(t => t.stepKey === stepKey && !t.dismissed);
      if (existing) return existing;
    }
    const now = Date.now();
    const timer = {
      id: 'tm_' + now + '_' + Math.random().toString(36).slice(2,7),
      label: label,
      mealName: mealName || '',
      stepKey: stepKey || '',
      startedAt: now,
      durationSec: durationSec,
      endsAt: now + (durationSec * 1000),
      expired: false,
      notifiedAt: null,
      dismissed: false
    };
    this.list.push(timer);
    this.save();
    this.startTickIfNeeded();
    this.notify();
    return timer;
  },

  remove(id) {
    this.load();
    this.list = this.list.filter(t => t.id !== id);
    this.save();
    this.notify();
  },

  dismiss(id) {
    this.load();
    const t = this.list.find(x => x.id === id);
    if (t) { t.dismissed = true; this.save(); }
    this.notify();
  },

  // Get all active (non-dismissed) timers
  getActive() {
    this.load();
    return this.list.filter(t => !t.dismissed);
  },

  // Get remaining seconds for a specific timer (negative if expired)
  remainingSec(id) {
    this.load();
    const t = this.list.find(x => x.id === id);
    if (!t) return 0;
    return Math.round((t.endsAt - Date.now()) / 1000);
  },

  // Find timer by step key
  findByStepKey(stepKey) {
    this.load();
    return this.list.find(t => t.stepKey === stepKey && !t.dismissed);
  },

  // Notify all listeners (UI re-render hooks)
  notify() {
    this.listeners.forEach(fn => { try { fn(); } catch(e) {} });
  },

  subscribe(fn) {
    this.listeners.push(fn);
    return () => { this.listeners = this.listeners.filter(f => f !== fn); };
  },

  // Tick — runs every second while at least one active timer exists
  tick() {
    this.load();
    let changed = false;
    const now = Date.now();
    this.list.forEach(t => {
      if (t.dismissed) return;
      if (!t.expired && t.endsAt <= now) {
        t.expired = true;
        changed = true;
        // Play alarm and notify (only if just-expired this tick — the notifiedAt guard
        // prevents repeat alerts on re-renders)
        if (!t.notifiedAt) {
          t.notifiedAt = now;
          try {
            if (typeof playAlarmBeep === 'function') playAlarmBeep();
          } catch(e) {}
          try {
            if (typeof Notification !== 'undefined' && Notification.permission === 'granted') {
              new Notification('🍳 Timer Done', {
                body: t.label + (t.mealName ? ' · ' + t.mealName : ''),
                tag: t.id,
                icon: '/icon-192.png'
              });
            }
          } catch(e) {}
        }
      }
    });
    if (changed) this.save();
    this.notify();

    // Stop ticking if no active non-expired timers (saves CPU)
    const stillRunning = this.list.some(t => !t.dismissed && !t.expired);
    if (!stillRunning) {
      this.stopTick();
    }
  },

  startTickIfNeeded() {
    if (this.tickIntervalId) return;
    this.tickIntervalId = setInterval(() => this.tick(), 1000);
    // Run one immediate tick to catch already-expired timers from a previous session
    this.tick();
  },

  stopTick() {
    if (this.tickIntervalId) clearInterval(this.tickIntervalId);
    this.tickIntervalId = null;
  },

  // Boot — call once at app start to restore state and resume ticking
  init() {
    this.load();
    if (this.list.some(t => !t.dismissed && !t.expired)) {
      this.startTickIfNeeded();
    }
    // Request notification permission lazily — only when user actually starts a timer
  }
};

// Request notification permission on demand
function requestNotificationPermission() {
  try {
    if (typeof Notification === 'undefined') return Promise.resolve('unsupported');
    if (Notification.permission === 'granted') return Promise.resolve('granted');
    if (Notification.permission === 'denied') return Promise.resolve('denied');
    return Notification.requestPermission();
  } catch(e) { return Promise.resolve('error'); }
}

// ─── CHEF MODE ────────────────────────────────────────────────────────────────
// Fullscreen, immersive cooking interface inspired by Workout Mode. Always uses
// a consistent warm amber palette regardless of meal — this is the kitchen mode.
// Active step fills most of the screen with large readable text (designed to
// glance at from arm's length while phone is propped sideways). Upcoming steps
// peek in below at smaller scale. Persistent timers continue regardless of
// whether chef mode is open or not.

let chefModeMealName = null;
let chefModeWakeLock = null;
let chefModeUnsubscribe = null;

// Cookbook/parchment palette — warm cream background with deep ink-style text.
const CHEF_PALETTE = {
  primary:    '#c44a1a',  // deep terracotta — like a wax stamp / cookbook ink
  primaryDim: '#c44a1a55',
  bg:         '#f5ead0',  // aged parchment cream
  bgPanel:    '#ebe0c4',  // slightly darker inset surface
  bgRaised:   '#e0d3b0',  // raised cards (timer dock, callouts)
  border:     '#d4c5a0',  // warm tan border
  textPrimary:'#1a1410',  // warm near-black ink
  textDim:    '#5a4a38',  // sepia secondary text
  textMuted:  '#8a7558',  // faded paper notation
  done:       '#4a6628',  // deep olive/forest — like an herb stem
  warn:       '#8a1a1a',  // deep wine red — not alarm red
  info:       '#1f5f4a',  // deep kitchen-herb green
  onPrimary:  '#fff8e8',  // cream-on-terracotta for primary buttons
  onDone:     '#fff8e8',  // cream-on-olive for done buttons
  cardBright: '#fbf3df'   // brightest surface for cards/panels
};

async function openChefMode(meal) {
  if (!meal) return;
  chefModeMealName = meal.name;

  // Request screen wake lock — critical for cooking
  if ('wakeLock' in navigator) {
    try { chefModeWakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
  }

  // Subscribe to timer changes so the UI updates when timers tick or expire
  if (chefModeUnsubscribe) chefModeUnsubscribe();
  chefModeUnsubscribe = PersistentTimers.subscribe(() => renderChefMode(meal));

  renderChefMode(meal);
}

function closeChefMode() {
  if (chefModeUnsubscribe) { chefModeUnsubscribe(); chefModeUnsubscribe = null; }
  if (chefModeWakeLock) { try { chefModeWakeLock.release(); } catch(e) {} chefModeWakeLock = null; }
  const overlay = document.getElementById('chef-overlay');
  if (overlay) overlay.remove();
  chefModeMealName = null;
}

// One scrollable page. Top → meal title block → ingredients → all steps → finish button.
function renderChefMode(meal) {
  let overlay = document.getElementById('chef-overlay');
  if (!overlay) {
    overlay = el('div', {
      id: 'chef-overlay',
      style: {
        position: 'fixed',
        top: '0', left: '0', right: '0', bottom: '0',
        zIndex: '5500',
        background: CHEF_PALETTE.bg,
        overflow: 'auto',
        WebkitOverflowScrolling: 'touch',
        backgroundImage: 'radial-gradient(ellipse 900px 400px at 50% -10%, rgba(196,74,26,0.06) 0%, transparent 65%)'
      }
    });
    document.body.appendChild(overlay);
  }
  overlay.innerHTML = '';

  // Source steps — prefer chefSteps if available (originals with sensory/mistake/
  // tip data), fall back to plain instructions (alternatives).
  const hasChefData = meal.chefSteps && meal.chefSteps.length > 0;
  const steps = hasChefData ? meal.chefSteps : (meal.instructions || []);

  if (!steps.length) {
    // Edge case — meal has no instructions
    overlay.appendChild(div({padding:'40px 20px',textAlign:'center',color:CHEF_PALETTE.textDim},
      el('div',{style:{fontSize:'14px',marginBottom:'20px'}},'No instructions available for this meal.'),
      el('button',{class:'btn',style:{background:CHEF_PALETTE.primary,color:CHEF_PALETTE.onPrimary,padding:'12px 24px',borderRadius:'8px',border:'none',fontFamily:"'DM Mono',monospace",fontSize:'11px',letterSpacing:'0.18em',textTransform:'uppercase',fontWeight:'700',cursor:'pointer'},onclick:closeChefMode},'Close')
    ));
    return;
  }

  // ── TOP BAR (sticky) ──
  const topBar = div({
    position: 'sticky',
    top: '0',
    background: CHEF_PALETTE.bg,
    borderBottom: '1px solid ' + CHEF_PALETTE.border,
    padding: 'env(safe-area-inset-top, 12px) 16px 10px',
    zIndex: '20'
  });
  const topRow = div({display:'flex',justifyContent:'space-between',alignItems:'center',gap:'10px'});
  const titleCol = div({flex:'1',minWidth:'0'});
  titleCol.appendChild(el('div',{style:{fontSize:'8px',color:CHEF_PALETTE.primary,letterSpacing:'0.32em',textTransform:'uppercase',fontWeight:'700',marginBottom:'2px'}}, '👨‍🍳 Chef Mode'));
  titleCol.appendChild(el('div',{
    style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:'18px',color:CHEF_PALETTE.textPrimary,letterSpacing:'0.04em',lineHeight:'1.05',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}
  }, meal.name));
  topRow.appendChild(titleCol);
  topRow.appendChild(el('button',{
    class:'btn',
    style:{
      background:'transparent',color:CHEF_PALETTE.textDim,
      border:'1px solid '+CHEF_PALETTE.border,
      padding:'6px 12px',borderRadius:'6px',
      fontFamily:"'DM Mono',monospace",fontSize:'9px',
      letterSpacing:'0.15em',textTransform:'uppercase',
      cursor:'pointer',fontWeight:'700',flexShrink:'0'
    },
    onclick:(e)=>{e.stopPropagation();closeChefMode();}
  }, '✕ Exit'));
  topBar.appendChild(topRow);
  overlay.appendChild(topBar);

  // ── STICKY MULTI-TIMER PANEL ──
  const stickyTimers = renderChefStickyTimers(meal, steps);
  if (stickyTimers) overlay.appendChild(stickyTimers);

  // ── BODY (single scrolling document) ──
  const body = div({padding:'18px 16px 100px',maxWidth:'720px',margin:'0 auto'});

  // RECIPE TITLE BLOCK — meal name + meta pills
  const titleBlock = div({marginBottom:'18px'});
  titleBlock.appendChild(el('div',{
    style:{
      fontFamily:"'Bebas Neue',sans-serif",
      fontSize:'34px',color:CHEF_PALETTE.textPrimary,
      letterSpacing:'0.02em',lineHeight:'1.1',
      marginBottom:'8px'
    }
  }, meal.name));
  const metaRow = div({display:'flex',gap:'8px',flexWrap:'wrap'});
  if (hasChefData && meal.chefNotes) {
    if (meal.chefNotes.totalTime) metaRow.appendChild(chefMetaPill('⏱ ' + meal.chefNotes.totalTime, CHEF_PALETTE.primary));
    if (meal.chefNotes.activeTime) metaRow.appendChild(chefMetaPill('🔥 ' + meal.chefNotes.activeTime, CHEF_PALETTE.textDim));
    if (meal.chefNotes.difficulty) metaRow.appendChild(chefMetaPill(meal.chefNotes.difficulty, CHEF_PALETTE.textDim));
  }
  metaRow.appendChild(chefMetaPill(steps.length + ' steps', CHEF_PALETTE.textDim));
  if (meal.kcal || meal.calories) metaRow.appendChild(chefMetaPill('~' + (meal.kcal || meal.calories) + ' kcal', CHEF_PALETTE.textDim));
  titleBlock.appendChild(metaRow);
  body.appendChild(titleBlock);

  // INTRO NARRATIVE (chef notes intro)
  if (hasChefData && meal.chefNotes && meal.chefNotes.intro) {
    body.appendChild(div({
      background:CHEF_PALETTE.cardBright,
      border:'1px solid '+CHEF_PALETTE.border,
      borderLeft:'4px solid '+CHEF_PALETTE.primary,
      borderRadius:'10px',
      padding:'16px 18px',
      marginBottom:'18px'
    },
      el('div',{
        style:{fontSize:'15px',color:CHEF_PALETTE.textPrimary,lineHeight:'1.6',fontStyle:'italic'}
      }, meal.chefNotes.intro)
    ));
  }

  // INGREDIENTS — full list, always visible
  if (meal.ingredients && meal.ingredients.length) {
    const ingCard = div({
      background:CHEF_PALETTE.cardBright,
      border:'1px solid '+CHEF_PALETTE.border,
      borderRadius:'12px',
      padding:'18px',
      marginBottom:'24px'
    });
    ingCard.appendChild(div({
      display:'flex',justifyContent:'space-between',alignItems:'baseline',
      marginBottom:'12px',paddingBottom:'10px',borderBottom:'1px solid '+CHEF_PALETTE.border
    },
      el('div',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:'22px',color:CHEF_PALETTE.textPrimary,letterSpacing:'0.04em'}},'🛒 Ingredients'),
      el('div',{style:{fontSize:'10px',color:CHEF_PALETTE.textMuted,fontFamily:"'DM Mono',monospace",letterSpacing:'0.15em',textTransform:'uppercase',fontWeight:'700'}}, meal.ingredients.length + ' items')
    ));
    meal.ingredients.forEach((ing,ii) => {
      const row = div({
        display:'flex',justifyContent:'space-between',alignItems:'center',
        padding:'10px 0',
        borderBottom: ii<meal.ingredients.length-1 ? '1px solid '+CHEF_PALETTE.border : 'none',
        gap:'12px'
      });
      row.appendChild(el('span',{style:{fontSize:'15px',color:CHEF_PALETTE.textPrimary,flex:'1',minWidth:'0',lineHeight:'1.4'}}, ing.n));
      row.appendChild(el('span',{
        style:{fontSize:'13px',color:CHEF_PALETTE.primary,fontWeight:'700',flexShrink:'0',fontFamily:"'DM Mono',monospace"}
      }, formatIngredient(ing)));
      ingCard.appendChild(row);
    });
    body.appendChild(ingCard);
  }

  // STEPS SECTION HEADER
  body.appendChild(el('div',{
    style:{
      fontFamily:"'Bebas Neue',sans-serif",
      fontSize:'24px',color:CHEF_PALETTE.textPrimary,
      letterSpacing:'0.04em',
      marginBottom:'14px',
      paddingBottom:'8px',
      borderBottom:'2px solid '+CHEF_PALETTE.primary
    }
  }, '📋 Method'));

  // ALL STEPS — rendered in sequence, each is its own card
  steps.forEach((step, si) => {
    body.appendChild(renderChefStep(step, si, meal, hasChefData));
  });

  // ── FINISH BUTTON ──
  body.appendChild(el('button',{
    class:'btn',
    style:{
      width:'100%',
      background:CHEF_PALETTE.done,color:CHEF_PALETTE.onDone,
      border:'none',
      padding:'18px 22px',borderRadius:'12px',
      fontFamily:"'DM Mono',monospace",fontSize:'13px',
      letterSpacing:'0.24em',textTransform:'uppercase',
      cursor:'pointer',fontWeight:'700',
      marginTop:'24px',
      boxShadow:'0 4px 16px rgba(74,102,40,0.25)'
    },
    onclick:(e)=>{
      e.stopPropagation();
      closeChefMode();
    }
  }, '✓  Finish Cooking'));

  overlay.appendChild(body);
}

// ── CHEF META PILL ──
function chefMetaPill(text, color) {
  return el('span',{
    style:{
      fontSize:'10px',color:color,
      fontFamily:"'DM Mono',monospace",
      letterSpacing:'0.12em',textTransform:'uppercase',
      fontWeight:'700',padding:'5px 10px',
      background:CHEF_PALETTE.bgRaised,
      border:'1px solid '+CHEF_PALETTE.border,
      borderRadius:'5px'
    }
  }, text);
}

// ── STEP CARD ──
// Single style for every step. Each gets its own card with full body text,
// callout chips, why footnote, and timer button (where applicable).
function renderChefStep(step, si, meal, hasChefData) {
  const card = div({
    id: 'chef-step-' + si,
    background: CHEF_PALETTE.cardBright,
    border: '1px solid ' + CHEF_PALETTE.border,
    borderRadius: '12px',
    padding: '20px 20px',
    marginBottom: '12px',
    position: 'relative'
  });

  // STEP NUMBER + LABEL + STOPWATCH HEADER ROW
  // Timer (when present) sits to the right as a compact stopwatch — same height
  // as the step number badge, so the header reads as: [#] STEP N ........ [⏱]
  const stepHeader = div({
    display:'flex',alignItems:'flex-start',gap:'14px',
    marginBottom:'14px'
  });

  const numWrap = div({
    width:'44px',height:'44px',borderRadius:'50%',
    background: CHEF_PALETTE.primary,
    border:'2px solid '+CHEF_PALETTE.primary,
    display:'flex',alignItems:'center',justifyContent:'center',
    flexShrink:'0',
    boxShadow:'0 2px 5px rgba(196,74,26,0.2)'
  });
  numWrap.appendChild(el('div',{
    style:{
      fontFamily:"'Anton','Bebas Neue',sans-serif",
      fontSize:'24px',color:CHEF_PALETTE.onPrimary,
      letterSpacing:'-0.02em',lineHeight:'1',fontWeight:'700'
    }
  }, (si+1)+''));
  stepHeader.appendChild(numWrap);

  const labelCol = div({flex:'1',paddingTop:'6px',minWidth:'0'});
  labelCol.appendChild(el('div',{
    style:{
      fontSize:'9px',color:CHEF_PALETTE.primary,
      letterSpacing:'0.32em',textTransform:'uppercase',
      fontWeight:'700'
    }
  }, 'Step ' + (si+1)));
  stepHeader.appendChild(labelCol);

  // Stopwatch widget on the right (only if step has a timer)
  if (step.timer && step.timer > 0) {
    stepHeader.appendChild(renderChefStopwatch(step, si, meal));
  }

  card.appendChild(stepHeader);

  // STEP BODY (large readable text)
  card.appendChild(el('p',{
    style:{
      margin:'0 0 14px 0',
      fontSize:'19px',
      color:CHEF_PALETTE.textPrimary,
      lineHeight:'1.5',
      fontWeight:'500',
      letterSpacing:'0.005em'
    }
  }, step.step));

  // CALLOUT CHIPS (only if chef data — sensory check / mistake / tip)
  if (hasChefData) {
    const callouts = [];
    if (step.sensoryCheck) callouts.push({key:'sense', icon:'👁', label:'Sensory Check', color:CHEF_PALETTE.info, body:step.sensoryCheck});
    if (step.mistake) callouts.push({key:'miss', icon:'⚠', label:'Common Mistake', color:CHEF_PALETTE.warn, body:step.mistake});
    if (step.tip) callouts.push({key:'tip', icon:'💡', label:'Pro Tip', color:CHEF_PALETTE.done, body:step.tip});

    if (callouts.length) {
      const chipRow = div({display:'flex',gap:'8px',marginTop:'4px',flexWrap:'wrap'});
      callouts.forEach(c => {
        const ssKey = 'fraser_chef_callout_' + meal.name + '_s' + si + '_' + c.key;
        const isOpen = !!sessionStorage.getItem(ssKey);
        const chip = el('button',{
          class:'btn',
          style:{
            display:'flex',alignItems:'center',gap:'6px',
            background: isOpen ? c.color : 'transparent',
            color: isOpen ? CHEF_PALETTE.onPrimary : c.color,
            border: '1.5px solid ' + c.color,
            padding:'7px 12px',borderRadius:'18px',
            fontFamily:"'DM Mono',monospace",fontSize:'10px',
            letterSpacing:'0.16em',textTransform:'uppercase',
            cursor:'pointer',fontWeight:'700',
            transition:'all 0.15s ease'
          },
          onclick:(e)=>{
            e.stopPropagation();
            if (isOpen) sessionStorage.removeItem(ssKey);
            else sessionStorage.setItem(ssKey,'1');
            renderChefMode(meal);
          }
        },
          el('span',{style:{fontSize:'13px'}}, c.icon),
          el('span',{}, c.label)
        );
        chipRow.appendChild(chip);
      });
      card.appendChild(chipRow);

      // Render expanded callout panels below the chip row
      callouts.forEach(c => {
        const ssKey = 'fraser_chef_callout_' + meal.name + '_s' + si + '_' + c.key;
        if (!sessionStorage.getItem(ssKey)) return;
        card.appendChild(div({
          marginTop:'10px',
          background:CHEF_PALETTE.bgRaised,
          borderLeft:'3px solid '+c.color,
          padding:'12px 14px',borderRadius:'6px',
          display:'flex',gap:'10px'
        },
          el('span',{style:{flexShrink:'0',fontSize:'16px'}}, c.icon),
          el('div',{style:{flex:'1'}},
            el('div',{style:{fontSize:'9px',color:c.color,letterSpacing:'0.22em',textTransform:'uppercase',fontWeight:'700',marginBottom:'4px'}}, c.label),
            el('div',{style:{fontSize:'14px',color:CHEF_PALETTE.textPrimary,lineHeight:'1.5'}}, c.body)
          )
        ));
      });
    }

    // "Why" stays as the small italic footnote
    if (step.why) {
      card.appendChild(el('div',{
        style:{
          marginTop:'14px',
          fontSize:'13px',color:CHEF_PALETTE.textDim,
          lineHeight:'1.6',fontStyle:'italic',
          paddingLeft:'10px',
          borderLeft:'1px solid '+CHEF_PALETTE.border
        }
      }, step.why));
    }
  }

  // Note: the timer widget is rendered in the header row above (renderChefStopwatch)
  // — it sits as a compact circle next to the step number rather than a giant
  // bar at the bottom of the card.

  return card;
}

// ── STOPWATCH WIDGET ──
// Compact circular timer that lives in the step header next to the step number.
// Three states: idle (dashed border with ▷), running (solid border with countdown
// + progress ring), expired (olive border with ✓ pulsing). Tap to start; tap the
// small ✕ in the corner to stop a running timer (separate hit target prevents
// accidental stops when checking the time).
function renderChefStopwatch(step, si, meal) {
  const stepKey = meal.name + '__step' + si;
  const existing = PersistentTimers.findByStepKey(stepKey);
  const remaining = existing ? PersistentTimers.remainingSec(existing.id) : null;

  const SIZE = 68;          // overall widget diameter
  const ringStroke = 4;
  const ringR = (SIZE - ringStroke) / 2;
  const ringCircum = 2 * Math.PI * ringR;

  // Container — flex-shrink so it doesn't squeeze the label
  const wrap = el('div', {
    style:{
      width: SIZE+'px', height: SIZE+'px',
      flexShrink: '0',
      position: 'relative',
      marginTop: '-4px'  // align visually with the 44px step number circle
    }
  });

  if (existing && !existing.expired && remaining > 0) {
    // RUNNING — solid border, countdown digits, progress ring around
    const totalSec = step.timer;
    const fraction = Math.max(0, Math.min(1, remaining / totalSec));
    const dashOffset = ringCircum * (1 - fraction);

    // Background ring (track) and progress ring SVG
    const ringSvg = el('div', {
      style:{position:'absolute',top:'0',left:'0',width:SIZE+'px',height:SIZE+'px',pointerEvents:'none'}
    });
    ringSvg.innerHTML = `
      <svg width="${SIZE}" height="${SIZE}" style="transform:rotate(-90deg)">
        <circle cx="${SIZE/2}" cy="${SIZE/2}" r="${ringR}" fill="none" stroke="${CHEF_PALETTE.primary}22" stroke-width="${ringStroke}"/>
        <circle cx="${SIZE/2}" cy="${SIZE/2}" r="${ringR}" fill="none" stroke="${CHEF_PALETTE.primary}" stroke-width="${ringStroke}" stroke-linecap="round" stroke-dasharray="${ringCircum}" stroke-dashoffset="${dashOffset}" style="transition:stroke-dashoffset 1s linear"/>
      </svg>
    `;
    wrap.appendChild(ringSvg);

    // Inner button area — countdown digits, no border (the SVG ring is the border)
    const inner = el('button', {
      class:'btn',
      style:{
        position:'absolute',
        top: ringStroke + 'px', left: ringStroke + 'px',
        width: (SIZE - ringStroke*2) + 'px', height: (SIZE - ringStroke*2) + 'px',
        borderRadius:'50%',
        background:CHEF_PALETTE.cardBright,
        border:'none',cursor:'default',
        display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
        padding:'0',gap:'1px'
      }
    });
    inner.appendChild(el('div', {
      style:{
        fontFamily:"'Anton','Bebas Neue',sans-serif",
        fontSize:'18px',color:CHEF_PALETTE.primary,
        letterSpacing:'-0.02em',lineHeight:'1',fontWeight:'700'
      }
    }, formatTimerDisplay(remaining)));
    inner.appendChild(el('div', {
      style:{
        fontSize:'7px',color:CHEF_PALETTE.textMuted,
        letterSpacing:'0.18em',textTransform:'uppercase',
        fontWeight:'700',marginTop:'1px'
      }
    }, 'Running'));
    wrap.appendChild(inner);

    // Stop ✕ button in the top-right corner of the widget — separate hit target
    const stopBtn = el('button', {
      class:'btn',
      style:{
        position:'absolute',
        top:'-2px',right:'-2px',
        width:'22px',height:'22px',borderRadius:'50%',
        background:CHEF_PALETTE.warn,
        color:CHEF_PALETTE.onPrimary,
        border:'2px solid '+CHEF_PALETTE.cardBright,
        fontSize:'11px',fontWeight:'700',
        cursor:'pointer',
        display:'flex',alignItems:'center',justifyContent:'center',
        padding:'0',lineHeight:'1',
        boxShadow:'0 1px 3px rgba(0,0,0,0.15)'
      },
      onclick:(e)=>{
        e.stopPropagation();
        PersistentTimers.dismiss(existing.id);
        renderChefMode(meal);
      }
    }, '×');
    wrap.appendChild(stopBtn);

  } else if (existing && existing.expired) {
    // EXPIRED — olive border, big ✓, pulse glow
    const expiredBtn = el('button', {
      class:'btn',
      style:{
        width: SIZE+'px', height: SIZE+'px', borderRadius:'50%',
        background:'#dbe2c0',
        border:'2px solid '+CHEF_PALETTE.done,
        cursor:'pointer',
        display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
        padding:'0',gap:'0',
        animation:'pulseGlow 1.5s ease-in-out infinite'
      },
      onclick:(e)=>{
        e.stopPropagation();
        PersistentTimers.dismiss(existing.id);
        renderChefMode(meal);
      }
    });
    expiredBtn.appendChild(el('div', {
      style:{fontSize:'24px',color:CHEF_PALETTE.done,lineHeight:'1',fontWeight:'700'}
    }, '✓'));
    expiredBtn.appendChild(el('div', {
      style:{fontSize:'7px',color:CHEF_PALETTE.done,letterSpacing:'0.18em',textTransform:'uppercase',fontWeight:'700',marginTop:'2px'}
    }, 'Done'));
    wrap.appendChild(expiredBtn);

  } else {
    // IDLE — dashed terracotta border, ▷ play icon, duration label below
    const idleBtn = el('button', {
      class:'btn',
      style:{
        width: SIZE+'px', height: SIZE+'px', borderRadius:'50%',
        background:'transparent',
        border:'2px dashed '+CHEF_PALETTE.primary+'88',
        cursor:'pointer',
        display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
        padding:'0',gap:'1px',
        transition:'all 0.15s ease'
      },
      onmouseover:(e)=>{e.currentTarget.style.borderColor=CHEF_PALETTE.primary;e.currentTarget.style.background=CHEF_PALETTE.primary+'11';},
      onmouseout:(e)=>{e.currentTarget.style.borderColor=CHEF_PALETTE.primary+'88';e.currentTarget.style.background='transparent';},
      onclick:async (e)=>{
        e.stopPropagation();
        await requestNotificationPermission();
        if (typeof ensureAudioCtx === 'function') ensureAudioCtx();
        PersistentTimers.add(deriveTimerLabel(step), meal.name, step.timer, stepKey);
        renderChefMode(meal);
      }
    });
    idleBtn.appendChild(el('div', {
      style:{fontSize:'18px',color:CHEF_PALETTE.primary,lineHeight:'1',marginBottom:'1px'}
    }, '▷'));
    idleBtn.appendChild(el('div', {
      style:{
        fontFamily:"'DM Mono',monospace",fontSize:'10px',
        color:CHEF_PALETTE.primary,fontWeight:'700',
        letterSpacing:'0.05em',lineHeight:'1'
      }
    }, formatTimerDisplay(step.timer)));
    wrap.appendChild(idleBtn);
  }

  return wrap;
}

// Derive a short timer label from a step (first sentence-ish or first 40 chars)
function deriveTimerLabel(step) {
  if (!step || !step.step) return 'Timer';
  let s = step.step;
  const period = s.indexOf('.');
  if (period > 0 && period < 50) s = s.substring(0, period);
  if (s.length > 50) s = s.substring(0, 47) + '...';
  return s.trim();
}

// ── STICKY MULTI-TIMER PANEL ──
// Pinned below the top bar. Shows ALL timers running for this meal so you don't
// lose track. Each row includes the step number badge, step description, big
// Anton countdown, and a slim progress bar. Tap any row to scroll to that step.
function renderChefStickyTimers(meal, steps) {
  const allActive = PersistentTimers.getActive().filter(t => t.mealName === meal.name);
  if (!allActive.length) return null;

  const running = allActive.filter(t => !t.expired);
  const expired = allActive.filter(t => t.expired);

  const wrap = div({
    position:'sticky',
    top: 'calc(env(safe-area-inset-top, 0px) + 56px)',
    zIndex:'15',
    background: CHEF_PALETTE.bgPanel,
    borderBottom: '1px solid ' + CHEF_PALETTE.border,
    padding:'10px 14px',
    boxShadow:'0 4px 8px rgba(90,60,30,0.08)'
  });

  wrap.appendChild(div({
    display:'flex',justifyContent:'space-between',alignItems:'center',
    marginBottom:'8px'
  },
    el('div',{
      style:{fontSize:'9px',color:CHEF_PALETTE.primary,letterSpacing:'0.32em',textTransform:'uppercase',fontWeight:'700'}
    }, '⏱ Active Timers'),
    el('div',{
      style:{fontSize:'9px',color:CHEF_PALETTE.textMuted,fontFamily:"'DM Mono',monospace",letterSpacing:'0.15em',fontWeight:'700'}
    }, allActive.length + ' running')
  ));

  const stepIdxFromKey = (stepKey) => {
    if (!stepKey) return null;
    const m = stepKey.match(/__step(\d+)$/);
    return m ? parseInt(m[1], 10) : null;
  };

  // Helper to scroll to a step
  const scrollToStep = (idx) => {
    const node = document.getElementById('chef-step-' + idx);
    if (node) {
      // Account for the sticky top bar + timer panel offset
      const rect = node.getBoundingClientRect();
      const overlay = document.getElementById('chef-overlay');
      if (overlay) {
        const offset = overlay.scrollTop + rect.top - 180;
        overlay.scrollTo({top: offset, behavior:'smooth'});
      }
    }
  };

  // Expired first (more urgent)
  expired.forEach(t => {
    const stepIdx = stepIdxFromKey(t.stepKey);
    const row = div({
      display:'flex',alignItems:'center',gap:'10px',
      padding:'10px 12px',
      background:'#dbe2c0',
      border:'1.5px solid '+CHEF_PALETTE.done,
      borderRadius:'8px',marginBottom:'6px',
      animation:'pulseGlow 1.5s ease-in-out infinite',
      cursor:'pointer'
    });
    row.addEventListener('click',(e)=>{
      e.stopPropagation();
      if (stepIdx !== null) scrollToStep(stepIdx);
    });
    if (stepIdx !== null) {
      row.appendChild(div({
        width:'30px',height:'30px',borderRadius:'50%',
        background:CHEF_PALETTE.done,color:CHEF_PALETTE.onDone,
        display:'flex',alignItems:'center',justifyContent:'center',
        fontSize:'13px',fontWeight:'700',flexShrink:'0',
        fontFamily:"'DM Mono',monospace"
      }, (stepIdx+1)+''));
    }
    row.appendChild(div({flex:'1',minWidth:'0'},
      el('div',{style:{fontSize:'10px',color:CHEF_PALETTE.done,letterSpacing:'0.18em',textTransform:'uppercase',fontWeight:'700',marginBottom:'2px'}}, '✓ Done'),
      el('div',{style:{fontSize:'13px',color:CHEF_PALETTE.textPrimary,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',lineHeight:'1.3'}}, t.label)
    ));
    row.appendChild(el('button',{
      class:'btn',
      style:{
        background:CHEF_PALETTE.done,color:CHEF_PALETTE.onDone,
        border:'none',padding:'6px 12px',borderRadius:'6px',
        fontFamily:"'DM Mono',monospace",fontSize:'9px',
        letterSpacing:'0.15em',textTransform:'uppercase',
        cursor:'pointer',fontWeight:'700',flexShrink:'0'
      },
      onclick:(e)=>{e.stopPropagation();PersistentTimers.dismiss(t.id);}
    },'Dismiss'));
    wrap.appendChild(row);
  });

  // Running timers
  running.forEach(t => {
    const remaining = PersistentTimers.remainingSec(t.id);
    const stepIdx = stepIdxFromKey(t.stepKey);
    const totalSec = t.durationSec || 1;
    const fraction = Math.max(0, Math.min(1, remaining / totalSec));

    const row = div({
      padding:'10px 12px',
      background:CHEF_PALETTE.bgRaised,
      border:'1px solid '+CHEF_PALETTE.border,
      borderRadius:'8px',marginBottom:'6px',
      cursor:'pointer'
    });
    row.addEventListener('click',(e)=>{
      e.stopPropagation();
      if (stepIdx !== null) scrollToStep(stepIdx);
    });

    const topLine = div({display:'flex',alignItems:'center',gap:'10px'});
    if (stepIdx !== null) {
      topLine.appendChild(div({
        width:'30px',height:'30px',borderRadius:'50%',
        background:CHEF_PALETTE.primary,color:CHEF_PALETTE.onPrimary,
        display:'flex',alignItems:'center',justifyContent:'center',
        fontSize:'13px',fontWeight:'700',flexShrink:'0',
        fontFamily:"'DM Mono',monospace"
      }, (stepIdx+1)+''));
    } else {
      topLine.appendChild(el('span',{style:{color:CHEF_PALETTE.primary,fontSize:'18px',flexShrink:'0',width:'30px',textAlign:'center'}},'⏱'));
    }
    topLine.appendChild(div({flex:'1',minWidth:'0'},
      el('div',{style:{fontSize:'13px',color:CHEF_PALETTE.textPrimary,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',lineHeight:'1.3',fontWeight:'500'}}, t.label)
    ));
    topLine.appendChild(el('div',{
      style:{
        fontFamily:"'Anton','Bebas Neue',sans-serif",
        fontSize:'26px',color:CHEF_PALETTE.primary,
        letterSpacing:'-0.01em',flexShrink:'0',
        lineHeight:'1'
      }
    }, formatTimerDisplay(Math.max(0, remaining))));
    row.appendChild(topLine);

    const progressBar = div({
      height:'2px',background:CHEF_PALETTE.border,
      borderRadius:'1px',marginTop:'8px',overflow:'hidden'
    });
    progressBar.appendChild(div({
      height:'100%',width:(fraction*100)+'%',
      background:CHEF_PALETTE.primary,
      transition:'width 1s linear'
    }));
    row.appendChild(progressBar);

    wrap.appendChild(row);
  });

  return wrap;
}

// ─── INIT TIMERS ON BOOT ───────────────────────────────────────────────────────
PersistentTimers.init();

function handleTimerClick(id, totalSeconds, description) {
  const btn = document.getElementById(id);
  if (!btn) return;
  const state = btn.getAttribute('data-state');

  if (state === 'idle') {
    // Start
    startInAppTimer(id, totalSeconds, description);
  } else if (state === 'running') {
    // Cancel
    cancelInAppTimer(id);
  } else if (state === 'done') {
    // Reset to idle
    resetTimerButton(id, totalSeconds);
  }
}

function startInAppTimer(id, totalSeconds, description) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.setAttribute('data-state', 'running');
  btn.setAttribute('data-remaining', totalSeconds + '');
  btn.style.background = '#1a1208';
  btn.style.borderColor = '#ff6b3555';
  const icon = btn.querySelector('.timer-icon');
  if (icon) { icon.textContent = '⏸'; icon.style.color = '#ff6b35'; }

  // Notification permission prompt on first start
  if ('Notification' in window && Notification.permission === 'default' && !notificationPermissionAsked) {
    notificationPermissionAsked = true;
    Notification.requestPermission().catch(()=>{});
  }

  const endAt = Date.now() + totalSeconds * 1000;
  const tick = () => {
    const b = document.getElementById(id);
    if (!b) {
      // DOM element gone (card collapsed or re-rendered) — clean up
      if (activeTimers[id]) {
        clearInterval(activeTimers[id].intervalId);
        delete activeTimers[id];
      }
      return;
    }
    if (b.getAttribute('data-state') !== 'running') return;
    const remaining = Math.max(0, Math.round((endAt - Date.now()) / 1000));
    b.setAttribute('data-remaining', remaining + '');
    const text = b.querySelector('.timer-text');
    if (text) text.textContent = formatTimerDisplay(remaining);
    const fill = b.querySelector('.timer-fill');
    if (fill) {
      const pct = ((totalSeconds - remaining) / totalSeconds) * 100;
      fill.style.width = pct + '%';
    }
    if (remaining <= 0) {
      finishInAppTimer(id, description);
      return;
    }
  };
  tick();
  const intId = setInterval(tick, 1000);
  activeTimers[id] = { intervalId: intId };
}

function cancelInAppTimer(id) {
  const t = activeTimers[id];
  if (t && t.intervalId) clearInterval(t.intervalId);
  delete activeTimers[id];
  const btn = document.getElementById(id);
  if (!btn) return;
  const total = parseInt(btn.getAttribute('data-total'), 10);
  resetTimerButton(id, total);
}

function resetTimerButton(id, totalSeconds) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.setAttribute('data-state', 'idle');
  btn.setAttribute('data-remaining', totalSeconds + '');
  btn.style.background = '#141414';
  btn.style.borderColor = '#2a2a2a';
  btn.style.boxShadow = 'none';
  btn.classList.remove('timer-flash');
  const icon = btn.querySelector('.timer-icon');
  if (icon) { icon.textContent = '▷'; icon.style.color = '#ff6b35'; }
  const text = btn.querySelector('.timer-text');
  if (text) text.textContent = formatTimerDisplay(totalSeconds);
  const fill = btn.querySelector('.timer-fill');
  if (fill) fill.style.width = '0%';
}

function finishInAppTimer(id, description) {
  const t = activeTimers[id];
  if (t && t.intervalId) clearInterval(t.intervalId);
  delete activeTimers[id];
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.setAttribute('data-state', 'done');
  btn.style.background = '#0a2a0a';
  btn.style.borderColor = '#6aff3b';
  btn.style.boxShadow = '0 0 0 0 #6aff3b88';
  btn.classList.add('timer-flash');
  const icon = btn.querySelector('.timer-icon');
  if (icon) { icon.textContent = '✓'; icon.style.color = '#6aff3b'; }
  const text = btn.querySelector('.timer-text');
  if (text) { text.textContent = 'Done!'; text.style.color = '#6aff3b'; }
  const fill = btn.querySelector('.timer-fill');
  if (fill) fill.style.width = '100%';
  // Alarm
  playAlarmBeep();
  maybeShowNotification(description);
  // Auto-reset after 8 seconds
  setTimeout(() => {
    const b = document.getElementById(id);
    if (b && b.getAttribute('data-state') === 'done') {
      const total = parseInt(b.getAttribute('data-total'), 10);
      const text2 = b.querySelector('.timer-text');
      if (text2) text2.style.color = '#ebebeb';
      resetTimerButton(id, total);
    }
  }, 8000);
}

// Per-tab configuration for which top-of-screen chrome to show. Each tab has
// different needs — workout owns the catch-up banner, water has its own hero
// and doesn't need any day-context banners, etc. This keeps each page feeling
// distinct from the others rather than every tab showing identical chrome.
function getTabHeaderConfig(tab) {
  // Workout: full context — this is the page where day/training info lives.
  if (tab === 'train') {
    return { daySelector: true, catchup: true, dayBanner: true, reorderHint: true };
  }
  // Nutrition: per-day, fueling context relevant. But the catch-up banner
  // ("5 sessions missed") is workout-specific so it doesn't belong here.
  if (tab === 'fuel') {
    return { daySelector: true, catchup: false, dayBanner: true, reorderHint: true };
  }
  // Water: per-day data (you log water for each day) but doesn't need the
  // workout/nutrition banner. The big 0.0L hero is the page's identity.
  if (tab === 'water') {
    return { daySelector: true, catchup: false, dayBanner: false, reorderHint: false };
  }
  // Overview, Sleep, Shopping, History: no day chrome needed. These pages
  // own their full vertical space for their specific content.
  return { daySelector: false, catchup: false, dayBanner: false, reorderHint: false };
}

function applyTabHeaderConfig() {
  const cfg = getTabHeaderConfig(activeTab);
  const ds = document.getElementById('day-selector');
  if (ds) ds.style.display = cfg.daySelector ? 'flex' : 'none';
  const db = document.getElementById('day-banner');
  if (db) db.style.display = cfg.dayBanner ? 'flex' : 'none';
  const cb = document.getElementById('catchup-banner');
  if (cb) cb.style.display = cfg.catchup ? '' : 'none';
  const rh = document.getElementById('reorder-hint');
  if (rh) rh.style.display = cfg.reorderHint ? '' : 'none';
  // Sleep-priority banner has its own visibility logic inside its renderer
  // (only shows on Workout tab when training day + bad sleep). We just clear
  // it for non-train tabs.
  const spb = document.getElementById('sleep-priority-banner');
  if (spb && activeTab !== 'train') {
    spb.style.display = 'none';
    spb.innerHTML = '';
  }
  // Only call the renderers for chrome we're actually showing
  if (cfg.daySelector) renderDaySelector();
  if (cfg.reorderHint) renderReorderHint();
  if (cfg.catchup) renderCatchUpBanner();
  if (cfg.dayBanner) renderDayBanner();
  // Always run the sleep banner renderer; it self-hides when not relevant
  if (activeTab === 'train') renderSleepPriorityBanner();
}

function render() {
  renderTabs();
  applyTabHeaderConfig();
  renderActiveTab();
}

// `scrollPos` is the source-of-truth scroll offset measured in "tab units"
// (so scrollPos=2 means the 3rd tab is at center). It's a continuous float
// that animates between integer values during settling.
let haloScrollPos = 0;          // current visual scroll position (in tab units)
let haloTargetPos = 0;          // where we're animating to
let haloVelocity = 0;           // tab-units per second, drives momentum
let haloAnimating = false;      // is the animation loop running
let haloLastFrameTime = 0;      // for delta-time computation

// ── EXPAND / COLLAPSE STATE ────────────────────────────────────────────────
// The bar has two visual states: 'expanded' (full bar with all 7 tabs visible
// for navigation) and 'collapsed' (single pill showing only the active tab).
// Default: expanded on first load, then collapses after first scroll or 5s of
// no interaction, whichever comes first.
let haloMode = 'expanded';                // 'expanded' | 'collapsed'
let haloAutoCollapseTimer = null;
const HALO_AUTO_COLLAPSE_MS = 5000;
let haloLastScrollY = 0;                  // tracks scroll direction for re-expand
let haloScrollUpDelta = 0;                // accumulated upward scroll
const HALO_REEXPAND_SCROLL_PX = 80;       // upward scroll px needed to re-expand

function setHaloMode(mode) {
  if (haloMode === mode) return;
  haloMode = mode;
  // Clear any pending timer when mode changes
  if (haloAutoCollapseTimer) {
    clearTimeout(haloAutoCollapseTimer);
    haloAutoCollapseTimer = null;
  }
  // If expanded, start the auto-collapse countdown
  if (haloMode === 'expanded') {
    scheduleHaloAutoCollapse();
  }
  // Reset scroll-tracker so accidental small scrolls don't trigger re-expand
  haloScrollUpDelta = 0;
  applyHaloModeStyles();
  renderHaloNav();
}

function scheduleHaloAutoCollapse() {
  if (haloAutoCollapseTimer) clearTimeout(haloAutoCollapseTimer);
  haloAutoCollapseTimer = setTimeout(() => {
    if (haloMode === 'expanded' && !haloDragActive) {
      setHaloMode('collapsed');
    }
  }, HALO_AUTO_COLLAPSE_MS);
}

// ── ARC GEOMETRY ──────────────────────────────────────────────────────────
// Computes where a tab should sit vertically based on its horizontal distance
// from center. Mirrors the SVG path which peaks at viewBox y=5 (top of arc)
// and bottoms out at y=60 (corners). We map that into pixel coordinates
// inside the wrapper element.
//
// Input: xOffsetPx — horizontal distance from center, in pixels
//        trackWidth — full width of the track in pixels
// Output: yOffsetPx — vertical position in the wrapper (0 = top)
function arcYAtX(xOffsetPx, trackWidth) {
  // Normalize x to range [-1, 1] across the track width
  const halfW = trackWidth / 2;
  const t = Math.max(-1, Math.min(1, xOffsetPx / halfW));
  // Concave wheel arc — center sits HIGHER than edges (edges curve down toward
  // the corners). Values are y-position from the TOP of the 140px wrapper for
  // each icon's center. Both peak and baseline are in the lower half of the
  // wrapper so the icons hug the bottom edge of the screen, with the curve
  // rising modestly upward at center.
  const peakY = 50;        // center icon — sits in the middle vertically
  const baselineY = 110;   // edge icons — sit near the bottom of the wrapper
  const depth = baselineY - peakY;
  // Quadratic curve: 0 at center, 1 at edges
  const curve = t * t;
  return peakY + depth * curve;
}

function renderHaloNav() {

      const bubble = document.createElement('div');
      bubble.className = 'halo-tab-bubble';
      bubble.style.cssText = `

      const iconWrap = document.createElement('div');

      bubble.appendChild(iconWrap);

      labelEl.textContent = tab.label;

  buttons.forEach((btn, i) => {
    const tab = HALO_TABS[i];
    const accent = getTabAccent(tab.id);

    // ── COLLAPSED MODE — only the active tab visible, centered as a pill ──
    if (haloMode === 'collapsed') {
      const activeIdx = HALO_TABS.findIndex(t => t.id === activeTab);
      if (i !== activeIdx) {
        btn.style.opacity = '0';
        btn.style.pointerEvents = 'none';
        btn.style.transform = 'translateX(0px) translateY(0px) scale(0.5)';
        btn.style.transition = 'opacity 0.22s ease, transform 0.28s cubic-bezier(0.4, 0, 0.6, 1)';
        return;
      }
      // Active tab — sits at center, slightly smaller for the pill look
      btn.style.opacity = '1';
      btn.style.pointerEvents = 'auto';
      btn.style.transform = 'translateX(0px) translateY(-12px) scale(0.78)';
      btn.style.transition = 'opacity 0.22s ease 0.05s, transform 0.32s cubic-bezier(0.34, 1.2, 0.45, 1)';
      btn.style.zIndex = '100';

      // Style the bubble: filled with accent, with glow
      const bubble = btn.querySelector('.halo-tab-bubble');
      if (bubble) {
        bubble.style.background = `linear-gradient(135deg, ${accent}, ${accent}dd)`;
        bubble.style.border = '1px solid ' + accent + 'aa';
        bubble.style.boxShadow = `0 4px 16px ${accent}55, inset 0 1px 0 rgba(255,255,255,0.18)`;
      }

      const iconWrap = btn.querySelector('.halo-tab-icon');
      if (iconWrap) {
        // Icon in cream/white when bubble is filled with accent (better contrast)
        const iconColor = '#ffffff';
        iconWrap.style.color = iconColor;
        if (iconWrap.dataset.colored !== iconColor) {
          iconWrap.innerHTML = HALO_ICONS[tab.id] ? HALO_ICONS[tab.id]() : '';
          iconWrap.dataset.colored = iconColor;
        }
      }
      const labelEl = btn.querySelector('.halo-tab-label');
      if (labelEl) {
        labelEl.style.color = accent;
        labelEl.style.transition = 'color 0.22s';
      }
      const dot = btn.querySelector('.halo-tab-dot');
      if (dot) {
        dot.style.background = accent;
        dot.style.boxShadow = '0 0 6px ' + accent;
        dot.style.opacity = '1';
      }
      return;
    }

    // ── EXPANDED MODE — wheel arc with concave curve ──

    const dragRel = i - clampedScrollPos;
    const absRel = Math.abs(dragRel);

    if (absRel > VISIBLE_RANGE) {
      btn.style.opacity = '0';
      btn.style.transform = 'translateX(' + (dragRel * SPACING) + 'px) scale(0.4)';
      btn.style.pointerEvents = 'none';
      btn.style.transition = 'opacity 0.22s ease, transform 0.32s cubic-bezier(0.34, 1.2, 0.45, 1)';
      return;
    }

    btn.style.pointerEvents = 'auto';

    // Scale: peaks at center, smaller at edges
    const centerProximity = Math.max(0, 1 - absRel * 0.5);  // 1.0 at center, smooth falloff
    const baseScale = Math.max(0.55, 1 - absRel * 0.16);
    const centerBoost = Math.max(0, 1 - absRel) * 0.35;   // big bump for the centermost tab
    let scale = baseScale + centerBoost;
    if (haloLongPressActive && haloPreviewIdx === i) {
      scale = scale * 1.15;
    }

    const opacity = Math.max(0.32, 1 - absRel * 0.22);

    const xOffset = dragRel * SPACING;

    // Concave arc Y position: edges are LOW (further from camera/below peak),
    // center is HIGH (peak/closest to camera). The yArc value is the pixel
    // distance from the TOP of the wrapper. So smaller yArc = higher on screen.
    // We position btn at top:0 and translateY = yArc - someOffset to place
    // the icon vertically along the arc.
    //
    // The wrapper is 140px tall. We want the center button to sit so its icon
    // is roughly aligned with the peak (~y=14px from top of wrapper). Edge
    // tabs sit at y=70px from top (near the baseline of the arc).
    //
    // Each button is 72px tall internally; we center its content via flex.
    // The button's top:0 means its top edge starts at the wrapper top. To
    // place its CENTER at yArc, we translateY by (yArc - 36) where 36 is
    // half the button height.
    const yArc = arcYAtX(xOffset, trackW);
    // Offset relative to the default top:0 position
    // Default button center is at y = 36 (half of 72px button)
    // We want center at y = yArc, so translateY by (yArc - 36)
    const yOffset = yArc - 36;

    btn.style.transform = `translateX(${xOffset}px) translateY(${yOffset}px) scale(${scale})`;
    btn.style.opacity = opacity + '';
    btn.style.zIndex = Math.round(100 - absRel * 10) + '';
    btn.style.transition = haloDragActive
      ? 'none'
      : 'transform 0.32s cubic-bezier(0.34, 1.2, 0.45, 1), opacity 0.25s ease';

    const isCenter = absRel < 0.5;
    const isPreview = haloLongPressActive && haloPreviewIdx === i;

    // Style the bubble — filled accent for center, dim charcoal for the rest
    const bubble = btn.querySelector('.halo-tab-bubble');
    if (bubble) {
      if (isCenter || isPreview) {
        // Active bubble: filled accent gradient with glow
        bubble.style.background = `linear-gradient(135deg, ${accent}, ${accent}dd)`;
        bubble.style.border = '1px solid ' + accent + 'aa';
        bubble.style.boxShadow = `0 6px 20px ${accent}55, 0 2px 6px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.18)`;
      } else {
        // Inactive bubble: dim charcoal with subtle accent-tinted edge
        bubble.style.background = 'rgba(22,22,22,0.85)';
        bubble.style.border = '1px solid ' + accent + '20';
        bubble.style.boxShadow = '0 4px 12px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04)';
      }
    }

    const iconWrap = btn.querySelector('.halo-tab-icon');
    if (iconWrap) {
      // Active: white/cream icon on filled bubble. Inactive: muted accent on dark bubble.
      const iconColor = (isCenter || isPreview) ? '#ffffff' : (accent + 'aa');
      iconWrap.style.color = iconColor;
      if (iconWrap.dataset.colored !== iconColor) {
        iconWrap.innerHTML = HALO_ICONS[tab.id] ? HALO_ICONS[tab.id]() : '';
        iconWrap.dataset.colored = iconColor;
      }
    }

    const labelEl = btn.querySelector('.halo-tab-label');
    if (labelEl) {
      labelEl.style.color = (isCenter || isPreview) ? accent : 'transparent';
      labelEl.style.transition = 'color 0.2s';
    }

    const dot = btn.querySelector('.halo-tab-dot');
    if (dot) {
      const showDot = isCenter && !haloDragActive;
      dot.style.background = accent;
      dot.style.boxShadow = showDot ? '0 0 6px ' + accent : 'none';
      dot.style.opacity = showDot ? '1' : '0';
    }
  });
}

// ── ANIMATION LOOP ────────────────────────────────────────────────────────
// ── LIVE TAB COMMIT ───────────────────────────────────────────────────────
// During scroll/momentum, the bar visually moves through tabs. If we wait for
// the scroll to fully settle before swapping the visible page content, the
// screen feels disconnected from the bar (300-500ms lag after release).
// This helper commits the active tab whenever the bar's current center
// position changes — so the screen tracks the bar in real time. The expensive
// renderActiveTab() call is throttled via requestAnimationFrame, so even fast
// flings only render once per frame at most.
let haloPendingCommitFrame = null;

function maybeCommitHaloActiveTab() {
  const target = Math.round(haloScrollPos);
  const clamped = Math.max(0, Math.min(HALO_TABS.length - 1, target));
  const newTab = HALO_TABS[clamped].id;
  if (newTab === activeTab) return;

  // Lightweight, immediate: update the activeTab var, section label, and
  // accent colors. These are cheap and make the header feel responsive.
  activeTab = newTab;
  renderActiveSectionLabel();
  applyTabAccents();

  // Heavier work — show/hide tab content + run the per-tab render — is
  // throttled via rAF. Multiple changes in one frame coalesce to a single
  // render of the latest active tab.
  if (haloPendingCommitFrame) return;
  haloPendingCommitFrame = requestAnimationFrame(() => {
    haloPendingCommitFrame = null;
    renderActiveTab();
    // Per-tab header chrome — drives which banners are visible
    applyTabHeaderConfig();
  });
}

function startHaloAnimLoop() {
  if (haloAnimating) return;
  haloAnimating = true;
  haloLastFrameTime = performance.now();
  requestAnimationFrame(haloAnimFrame);
}

function haloAnimFrame(timestamp) {
  const dt = Math.min(0.05, (timestamp - haloLastFrameTime) / 1000);
  haloLastFrameTime = timestamp;

  if (Math.abs(haloVelocity) > 0.05) {
    haloScrollPos += haloVelocity * dt;
    haloVelocity *= Math.pow(0.05, dt);

    if (haloScrollPos < 0) {
      haloScrollPos = haloScrollPos * 0.7;
      haloVelocity *= 0.5;
    } else if (haloScrollPos > HALO_TABS.length - 1) {
      const max = HALO_TABS.length - 1;
      haloScrollPos = max + (haloScrollPos - max) * 0.7;
      haloVelocity *= 0.5;
    }
  } else {
    const target = Math.round(haloScrollPos);
    const clampedTarget = Math.max(0, Math.min(HALO_TABS.length - 1, target));
    const diff = clampedTarget - haloScrollPos;
    if (Math.abs(diff) < 0.005) {
      haloScrollPos = clampedTarget;
      haloVelocity = 0;
      haloAnimating = false;
      const newTab = HALO_TABS[clampedTarget].id;
      if (newTab !== activeTab) {
        activeTab = newTab;
        renderActiveSectionLabel();
        applyTabAccents();
        renderActiveTab();
      }
      renderHaloNav();
      return;
    }
    haloScrollPos += diff * Math.min(1, dt * 18);
  }

  // Live commit: as scroll position passes through each tab's center, swap
  // the visible page content so the screen tracks the bar in real time.
  maybeCommitHaloActiveTab();

  renderHaloNav();
  if (haloAnimating) requestAnimationFrame(haloAnimFrame);
}

// ── GESTURE HANDLERS WITH DIRECTION LOCK ──────────────────────────────────
// Critical change: we now require the user's first 12px of movement to be
// dominantly horizontal before we engage the halo scroll. If the first
// movement is vertical (like normal page scroll), we abandon the halo gesture
// entirely so the page can scroll naturally.
let haloDragLockedAxis = null;       // null | 'horizontal' | 'vertical'
let haloDragStartY = 0;              // y position where touch began
let haloDragStartedCollapsed = false; // whether the gesture started in collapsed mode
const HALO_DIR_LOCK_THRESHOLD = 12;  // pixels before we lock to an axis
const HALO_HORIZONTAL_DOMINANCE = 1.2;  // |dx| must exceed |dy| * 1.2 to lock horizontal

function attachHaloGestureHandlers() {
  const track = document.getElementById('halo-nav-track');
  if (!track) return;
  if (track.dataset.gesturesAttached) return;
  track.dataset.gesturesAttached = '1';

  const cancelLongPress = () => {
    if (haloLongPressTimer) {
      clearTimeout(haloLongPressTimer);
      haloLongPressTimer = null;
    }
    if (haloLongPressActive) {
      haloLongPressActive = false;
      haloPreviewIdx = null;
      renderHaloNav();
    }
  };

  const tabIdxAtClientX = (clientX) => {
    const rect = track.getBoundingClientRect();
    const xInTrack = clientX - rect.left - rect.width / 2;
    const relPos = xInTrack / haloSpacing;
    const idx = Math.round(haloScrollPos + relPos);
    return Math.max(0, Math.min(HALO_TABS.length - 1, idx));
  };

  const onStart = (clientX, clientY) => {
    if (haloAutoCollapseTimer) { clearTimeout(haloAutoCollapseTimer); haloAutoCollapseTimer = null; }
    haloDragActive = true;
    haloDragLockedAxis = null;       // reset axis lock at start of every gesture
    haloDragStartX = clientX;
    haloDragStartY = clientY;
    haloDragStartScrollPos = haloScrollPos;
    haloDragLastX = clientX;
    haloDragLastTime = performance.now();
    haloDragMoved = 0;
    haloVelocity = 0;
    haloAnimating = false;
    // Track whether this gesture started in collapsed mode — used in onEnd to
    // decide whether a "tap" (no significant movement) should expand the bar
    // or whether the horizontal swipe already opened it.
    haloDragStartedCollapsed = (haloMode === 'collapsed');

    // Long-press preview after 400ms of no significant movement
    haloLongPressTimer = setTimeout(() => {
      if (haloDragMoved < 8 && haloDragLockedAxis === null) {
        // If collapsed, a long-press also expands the bar so the preview is visible
        if (haloMode === 'collapsed') setHaloMode('expanded');
        haloLongPressActive = true;
        haloPreviewIdx = tabIdxAtClientX(clientX);
        haloDragLockedAxis = 'horizontal';  // preview implicitly engages halo
        renderHaloNav();
        try { if (navigator.vibrate) navigator.vibrate(8); } catch(e) {}
      }
    }, 400);
  };

  const onMove = (clientX, clientY) => {
    if (!haloDragActive) return;
    const now = performance.now();
    const totalDx = clientX - haloDragStartX;
    const totalDy = clientY - haloDragStartY;
    const absDx = Math.abs(totalDx);
    const absDy = Math.abs(totalDy);

    // ── DIRECTION LOCK ──
    // If we haven't locked to an axis yet, watch the first 12px of movement
    // and decide which way the user is gesturing.
    if (haloDragLockedAxis === null) {
      const totalDist = Math.max(absDx, absDy);
      if (totalDist >= HALO_DIR_LOCK_THRESHOLD) {
        if (absDx > absDy * HALO_HORIZONTAL_DOMINANCE) {
          // Horizontal dominant — engage the halo
          haloDragLockedAxis = 'horizontal';
          // If the gesture started while collapsed, expand the bar mid-gesture
          // so the swipe scrolls the now-visible halo. Drag continues from the
          // user's actual finger position — no second tap needed.
          if (haloDragStartedCollapsed && haloMode === 'collapsed') {
            setHaloMode('expanded');
          }
        } else {
          // Vertical dominant (or ambiguous) — release this gesture so the page can scroll
          haloDragLockedAxis = 'vertical';
          haloDragActive = false;
          cancelLongPress();
          // No render needed — bar stays where it was
          return;
        }
      } else {
        // Below threshold — wait for more movement before deciding
        return;
      }
    }

    // If locked to vertical, ignore (page handles it)
    if (haloDragLockedAxis === 'vertical') return;

    // ── HORIZONTAL DRAG (locked) ──
    const dx = clientX - haloDragLastX;
    const dt = (now - haloDragLastTime) / 1000;
    haloDragMoved += Math.abs(dx);

    // Cancel long-press if user has moved noticeably
    if (haloDragMoved > 8) {
      if (haloLongPressTimer) {
        clearTimeout(haloLongPressTimer);
        haloLongPressTimer = null;
      }
    }

    // Long-press active: track which tab is under the finger
    if (haloLongPressActive) {
      haloPreviewIdx = tabIdxAtClientX(clientX);
      renderHaloNav();
      haloDragLastX = clientX;
      haloDragLastTime = now;
      return;
    }

    // 1:1 finger tracking, scrolled in tab units (relative to start position)
    haloScrollPos = haloDragStartScrollPos - (totalDx / haloSpacing);

    if (dt > 0.002) {
      const instVel = -(dx / haloSpacing) / dt;
      haloVelocity = haloVelocity * 0.5 + instVel * 0.5;
    }

    haloDragLastX = clientX;
    haloDragLastTime = now;
    // Live commit: as the user's drag moves the bar's center past tab
    // boundaries, swap the visible page content so the screen tracks the bar.
    maybeCommitHaloActiveTab();
    renderHaloNav();
  };

  const onEnd = () => {
    if (!haloDragActive && haloDragLockedAxis !== 'horizontal') {
      // Either never started, or released to vertical scroll
      cancelLongPress();
      return;
    }
    haloDragActive = false;

    // Long-press tap (held still and released)
    if (haloLongPressActive && haloPreviewIdx !== null && haloDragMoved < 8) {
      const targetIdx = haloPreviewIdx;
      cancelLongPress();
      haloVelocity = 0;
      haloScrollPos = targetIdx;
      activeTab = HALO_TABS[targetIdx].id;
      renderActiveSectionLabel();
      applyTabAccents();
      renderActiveTab();
      renderHaloNav();
      if (haloMode === 'expanded') scheduleHaloAutoCollapse();
      haloDragLockedAxis = null;
      haloDragStartedCollapsed = false;
      return;
    }

    cancelLongPress();

    // No movement — this was a tap, not a swipe.
    // If we started in collapsed mode and released without movement, expand.
    // Otherwise (already expanded), just settle back to nearest tab.
    if (haloDragMoved < 5) {
      if (haloDragStartedCollapsed && haloMode === 'collapsed') {
        setHaloMode('expanded');
      } else {
        haloVelocity = 0;
        startHaloAnimLoop();
        if (haloMode === 'expanded') scheduleHaloAutoCollapse();
      }
      haloDragLockedAxis = null;
      haloDragStartedCollapsed = false;
      return;
    }

    // Momentum carry
    haloVelocity = Math.max(-12, Math.min(12, haloVelocity));
    startHaloAnimLoop();
    if (haloMode === 'expanded') scheduleHaloAutoCollapse();
    haloDragLockedAxis = null;
    haloDragStartedCollapsed = false;
  };

  // Touch (passive — we don't preventDefault, so vertical scrolling stays smooth)
  track.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    onStart(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive: true});
  track.addEventListener('touchmove', (e) => {
    if (e.touches.length !== 1) return;
    onMove(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive: true});
  track.addEventListener('touchend', onEnd, {passive: true});
  track.addEventListener('touchcancel', () => {
    cancelLongPress();
    haloDragActive = false;
    haloDragLockedAxis = null;
    startHaloAnimLoop();
  }, {passive: true});

  // Mouse (desktop testing) — same direction-lock logic via clientY
  let mouseDown = false;
  track.addEventListener('mousedown', (e) => {
    mouseDown = true;
    onStart(e.clientX, e.clientY);
  });
  window.addEventListener('mousemove', (e) => {
    if (mouseDown) onMove(e.clientX, e.clientY);
  });
  window.addEventListener('mouseup', () => {
    if (mouseDown) { mouseDown = false; onEnd(); }
  });

  // Tap-to-navigate (clicks where no significant drag occurred)
  track.addEventListener('click', (e) => {
    if (haloDragMoved > 5) return;
    const btn = e.target.closest('.halo-tab');
    if (!btn) return;
    e.stopPropagation();
    const idx = parseInt(btn.dataset.tabIdx, 10);
    if (isNaN(idx)) return;
    haloVelocity = 0;
    haloTargetPos = idx;
    const distance = idx - haloScrollPos;
    haloVelocity = distance * 6;
    startHaloAnimLoop();
    if (haloMode === 'expanded') scheduleHaloAutoCollapse();
  });

  // ── PAGE-LEVEL TRIGGERS ──

  // Tap anywhere on page content (outside the bar) → collapse if expanded
  document.addEventListener('click', (e) => {
    if (haloMode !== 'expanded') return;
    const halo = document.getElementById('halo-nav');
    if (halo && halo.contains(e.target)) return;
    if (e.target.closest('#wm-overlay, #chef-overlay, #fs-timer-overlay, #sleep-prompt-overlay, .confirm-overlay')) return;
    setHaloMode('collapsed');
  }, true);

  // Page scroll → collapse (when expanded), or re-expand (when collapsed and scrolling up)
  window.addEventListener('scroll', () => {
    const currentY = window.scrollY || document.documentElement.scrollTop || 0;
    const delta = currentY - haloLastScrollY;
    haloLastScrollY = currentY;

    if (haloMode === 'expanded') {
      if (Math.abs(delta) > 4) {
        setHaloMode('collapsed');
      }
    } else if (haloMode === 'collapsed') {
      if (delta < -2) {
        haloScrollUpDelta += -delta;
        if (haloScrollUpDelta >= HALO_REEXPAND_SCROLL_PX) {
          setHaloMode('expanded');
        }
      } else if (delta > 2) {
        haloScrollUpDelta = 0;
      }
    }
  }, {passive: true});

  // Tap on the halo wrapper itself (covers areas outside the track) — expands when collapsed
  const haloWrapper = document.getElementById('halo-nav');
  if (haloWrapper) {
    haloWrapper.addEventListener('click', (e) => {
      if (haloMode === 'collapsed') {
        setHaloMode('expanded');
        e.stopPropagation();
      }
    }, true);
  }
}

function renderDaySelector() {
  const sel = document.getElementById('day-selector');
  sel.innerHTML = '';
  const todayIdx = getTodayActiveDay();
  const status = getWeekStatus();
  const isCurrentWeek = weekOffset === 0;
  const order = getWeekDayOrder(); // Mon-first order array of activeDay indices

  order.forEach((activeDayIdx, monPos) => {
    const i = activeDayIdx;
    const d = PROGRAM[i];
    const np = NUTRITION[d.nutriType];
    const active = activeDay === i;
    const isToday = i === todayIdx && isCurrentWeek;
    const dStatus = status[i];

    // Status dot color
    let statusColor = null, statusGlyph = null;
    if (dStatus === 'past_complete') { statusColor = '#06d6a0'; statusGlyph = '✓'; }
    else if (dStatus === 'past_partial') { statusColor = '#FFD166'; statusGlyph = '◐'; }
    else if (dStatus === 'past_missed') { statusColor = '#ff5b5b'; statusGlyph = '✕'; }
    else if (dStatus === 'past_skipped') { statusColor = '#666'; statusGlyph = '↳'; }

    // Mon=0..Sun=6 → JS weekday (0=Sun..6=Sat): (monPos + 1) % 7
    const jsWeekday = (monPos + 1) % 7;
    const wdLabel = WEEKDAY_LABELS_SHORT[jsWeekday].toUpperCase();
    const dateForPill = getDateForWeekday(jsWeekday);
    const dateLabel = formatShortDate(dateForPill);

    // Border: today has a glowing border; active overrides
    let borderColor = '#1a1a1a';
    if (active) borderColor = d.accent;
    else if (isToday) borderColor = d.accent + '88';

    const btn = el('button',{
      class:'pill day-pill',
      'data-monpos': monPos + '',
      'data-activeday': i + '',
      style:{
        flex:'0 0 auto',
        minWidth:'74px',
        background: active ? d.accent : '#0e0e0e',
        color: active ? '#000' : '#555',
        border: '1px solid ' + borderColor,
        borderRadius:'6px',
        padding:'7px 8px',
        cursor:'pointer',
        fontFamily:"'DM Mono',monospace",
        textAlign:'center',
        fontSize:'11px',
        position:'relative',
        userSelect:'none',
        WebkitUserSelect:'none',
        touchAction:'pan-x'
      },
      onclick:()=>{
        if (btn.classList.contains('drag-suppress-click')) {
          btn.classList.remove('drag-suppress-click');
          return;
        }
        activeDay=i; expandedEx=null; expandedMeal=null; openMealSections={}; render();
      }
    });

    // Weekday label (top)
    btn.appendChild(el('div', {
      style: {
        fontSize:'7px',
        color: active ? '#00000099' : (isToday ? d.accent : '#666'),
        letterSpacing:'0.1em',
        marginBottom:'1px',
        fontWeight: isToday ? '700' : '400'
      }
    }, wdLabel + (isToday ? ' • TODAY' : '')));

    // Date label (just under weekday)
    btn.appendChild(el('div', {
      style: {
        fontSize:'6px',
        color: active ? '#00000077' : '#3a3a3a',
        letterSpacing:'0.05em',
        marginBottom:'3px'
      }
    }, dateLabel));

    // Title
    btn.appendChild(el('div', {style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:'14px',letterSpacing:'0.04em'}}, d.title));

    // Day label + nutrition tag
    btn.appendChild(el('div', {style:{fontSize:'6px',opacity:'0.55',marginTop:'1px',letterSpacing:'0.08em'}}, d.label));
    btn.appendChild(el('div', {style:{fontSize:'6px',color: active?'#00000088':np.color,marginTop:'2px',letterSpacing:'0.05em'}}, np.label.split(' ')[0].toUpperCase()));

    // Status indicator (top-right corner)
    if (statusGlyph && !active) {
      btn.appendChild(el('div', {
        style: {
          position:'absolute',
          top:'3px',
          right:'4px',
          fontSize:'8px',
          color: statusColor,
          fontWeight:'700',
          lineHeight:'1'
        }
      }, statusGlyph));
    }

    // Drag handle indicator (subtle, only visible during drag mode)
    btn.appendChild(el('div', {
      class: 'drag-grip',
      style: {
        position:'absolute',
        bottom:'2px',
        left:'50%',
        transform:'translateX(-50%)',
        fontSize:'8px',
        color: active ? '#00000044' : '#1a1a1a',
        letterSpacing:'1px',
        lineHeight:'1',
        pointerEvents:'none'
      }
    }, '⋯'));

    attachDragHandlers(btn);
    sel.appendChild(btn);
  });

// ─── DAY PILL DRAG-TO-REORDER ────────────────────────────────────────────────

let dragState = null; // {sourceMonPos, sourceEl, ghostEl, startX, startY, moved}

function attachDragHandlers(btn) {
  let pressTimer = null;
  let startX = 0, startY = 0;
  let activated = false;
  let cancelled = false;

  const onPressStart = (clientX, clientY) => {
    startX = clientX; startY = clientY; activated = false; cancelled = false;
    pressTimer = setTimeout(() => {
      if (cancelled) return;
      activateDrag(btn, clientX, clientY);
      activated = true;
    }, 450); // long press threshold
  };

  const onPressMove = (clientX, clientY) => {
    if (!activated) {
      // Any meaningful movement before activation cancels drag intent — let scroll happen
      const dx = Math.abs(clientX - startX);
      const dy = Math.abs(clientY - startY);
      if (dx > 6 || dy > 6) {
        cancelled = true;
        clearTimeout(pressTimer);
      }
      return;
    }
    handleDragMove(clientX, clientY);
  };

  const onPressEnd = () => {
    clearTimeout(pressTimer);
    cancelled = true;
    if (activated) {
      handleDragEnd(btn);
      activated = false;
    }
  };

  btn.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    onPressStart(t.clientX, t.clientY);
  }, {passive:true});
  btn.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    // Only block native scroll once drag has actually activated
    if (activated) e.preventDefault();
    onPressMove(t.clientX, t.clientY);
  }, {passive:false});
  btn.addEventListener('touchend', onPressEnd);
  btn.addEventListener('touchcancel', onPressEnd);

  btn.addEventListener('mousedown', (e) => {
    onPressStart(e.clientX, e.clientY);
    const onMove = (ev) => onPressMove(ev.clientX, ev.clientY);
    const onUp = () => {
      onPressEnd();
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

function activateDrag(sourceEl, x, y) {
  // Haptic feedback
  if (navigator.vibrate) { try { navigator.vibrate(40); } catch(e){} }
  const monPos = parseInt(sourceEl.getAttribute('data-monpos'), 10);
  // Floating ghost
  const rect = sourceEl.getBoundingClientRect();
  const ghost = sourceEl.cloneNode(true);
  ghost.style.position = 'fixed';
  ghost.style.left = rect.left + 'px';
  ghost.style.top = rect.top + 'px';
  ghost.style.width = rect.width + 'px';
  ghost.style.height = rect.height + 'px';
  ghost.style.opacity = '0.85';
  ghost.style.pointerEvents = 'none';
  ghost.style.zIndex = '9999';
  ghost.style.transform = 'scale(1.1)';
  ghost.style.boxShadow = '0 6px 18px rgba(0,0,0,0.6)';
  ghost.style.transition = 'transform 0.1s';
  document.body.appendChild(ghost);
  sourceEl.style.opacity = '0.25';
  dragState = {
    sourceEl,
    sourceMonPos: monPos,
    ghostEl: ghost,
    grabOffsetX: x - rect.left,
    grabOffsetY: y - rect.top,
    moved: false
  };
}

function handleDragMove(x, y) {
  if (!dragState) return;
  dragState.moved = true;
  const g = dragState.ghostEl;
  g.style.left = (x - dragState.grabOffsetX) + 'px';
  g.style.top = (y - dragState.grabOffsetY) + 'px';

  // Auto-scroll the day selector when finger is near left or right edge
  const sel = document.getElementById('day-selector');
  if (sel) {
    const rect = sel.getBoundingClientRect();
    const edgeZone = 60; // px from edge that triggers scroll
    const maxSpeed = 14; // px per frame at the very edge
    let scrollDelta = 0;
    if (x < rect.left + edgeZone) {
      const t = (rect.left + edgeZone - x) / edgeZone; // 0..1
      scrollDelta = -Math.min(maxSpeed, Math.ceil(t * maxSpeed));
    } else if (x > rect.right - edgeZone) {
      const t = (x - (rect.right - edgeZone)) / edgeZone;
      scrollDelta = Math.min(maxSpeed, Math.ceil(t * maxSpeed));
    }
    if (scrollDelta !== 0) {
      sel.scrollLeft += scrollDelta;
      // Keep auto-scrolling on a timer in case finger holds still at edge
      if (!dragState.autoScrollInterval) {
        dragState.autoScrollInterval = setInterval(() => {
          if (!dragState) return;
          sel.scrollLeft += dragState.lastScrollDelta || 0;
        }, 16);
      }
      dragState.lastScrollDelta = scrollDelta;
    } else if (dragState.autoScrollInterval) {
      clearInterval(dragState.autoScrollInterval);
      dragState.autoScrollInterval = null;
      dragState.lastScrollDelta = 0;
    }
  }

  // Find which day pill we're hovering over
  g.style.display = 'none';
  const elBelow = document.elementFromPoint(x, y);
  g.style.display = '';
  const targetPill = elBelow ? elBelow.closest('.day-pill') : null;
  // Highlight target
  document.querySelectorAll('.day-pill').forEach(p => {
    if (p === targetPill && p !== dragState.sourceEl) {
      p.style.outline = '2px dashed #06d6a0';
    } else {
      p.style.outline = '';
    }
  });
}

function handleDragEnd(sourceEl) {
  if (!dragState) return;
  // Stop any auto-scroll
  if (dragState.autoScrollInterval) {
    clearInterval(dragState.autoScrollInterval);
    dragState.autoScrollInterval = null;
  }
  const g = dragState.ghostEl;
  // Determine drop target
  const ghostRect = g.getBoundingClientRect();
  const dropX = ghostRect.left + ghostRect.width / 2;
  const dropY = ghostRect.top + ghostRect.height / 2;
  g.style.display = 'none';
  const elBelow = document.elementFromPoint(dropX, dropY);
  const targetPill = elBelow ? elBelow.closest('.day-pill') : null;
  if (targetPill && targetPill !== sourceEl) {
    const targetMonPos = parseInt(targetPill.getAttribute('data-monpos'), 10);
    swapDayPositions(dragState.sourceMonPos, targetMonPos);
  }
  // Cleanup
  g.remove();
  sourceEl.style.opacity = '';
  document.querySelectorAll('.day-pill').forEach(p => p.style.outline = '');
  if (dragState.moved) {
    sourceEl.classList.add('drag-suppress-click');
    setTimeout(() => sourceEl.classList.remove('drag-suppress-click'), 300);
  }
  dragState = null;
}

// ─── BAD SLEEP DETECTION ──────────────────────────────────────────────────
// Honest sports-science: training under-recovered (multiple nights of <7h)
// reduces strength output, increases injury risk, and rarely produces good
// adaptive response. This helper checks the most recent 3 logged nights and
// flags when at least 2 of 3 are below 6.5h (390 min). Threshold chosen to
// catch the situation Fraser described — averaging 6h for a few days, then
// barely finishing a Push session — without firing on a single off night.
function getBadSleepStatus() {
  const allSleep = getAllSleepLogs();
  if (allSleep.length === 0) return {bad: false};
  // Take last 3 nights with logged duration
  const recent = allSleep.filter(l => l.durationMin != null).slice(-3);
  if (recent.length < 2) return {bad: false};   // not enough data
  const POOR_THRESHOLD_MIN = 390;  // 6h 30m
  const poorCount = recent.filter(l => l.durationMin < POOR_THRESHOLD_MIN).length;
  if (poorCount < 2) return {bad: false};
  const avgMin = recent.reduce((a,l) => a + l.durationMin, 0) / recent.length;
  return {
    bad: true,
    nights: recent.length,
    poorCount,
    avgMin: Math.round(avgMin),
    avgHours: (avgMin / 60).toFixed(1)
  };
}

function todayKey() {
  const d = new Date();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return d.getFullYear() + '-' + m + '-' + day;
}

function dateKeyDaysAgo(days) {
  const d = new Date();
  d.setDate(d.getDate() - days);
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return d.getFullYear() + '-' + m + '-' + day;
}

function getAllMetrics() {
  // Returns array of {date, weight, bodyFat, chest, waist, ...} sorted by date asc
  const out = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.indexOf('fraser_metrics_') === 0) {
      try {
        const v = JSON.parse(localStorage.getItem(k));
        const date = k.substring('fraser_metrics_'.length);
        out.push({date, ...v});
      } catch(e) {}
    }
  }
  out.sort((a,b) => a.date.localeCompare(b.date));
  return out;
}

    alert('Storage full. Try removing older photos.');
  }
}

function deletePhoto(date) {
  try { localStorage.removeItem('fraser_photo_' + date); } catch(e) {}
  renderOverview();
}

    style:{
      position:'fixed',top:'0',left:'0',right:'0',bottom:'0',
      background:'rgba(0,0,0,0.95)',
