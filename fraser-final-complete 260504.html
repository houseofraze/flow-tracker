    style: {
      position: 'fixed',
      top: '0', left: '0', right: '0', bottom: '0',
      background: fillColor,
      zIndex: '5000',
      display: 'flex',
      flexDirection: 'column',
      alignItems: 'center',
      justifyContent: 'center',
      padding: '20px',
      overflow: 'hidden',
      cursor: 'pointer',
      userSelect: 'none',
      WebkitUserSelect: 'none',
      touchAction: 'manipulation',
      transition: 'background 0.4s ease'
    }
  });

  // Top bar: minimal close + kind label
  const topBar = div({
    position:'absolute', top:'0', left:'0', right:'0',
    display:'flex', justifyContent:'space-between', alignItems:'center',
    padding:'env(safe-area-inset-top, 16px) 22px 12px',
    pointerEvents:'none'
  });

  const closeBtn = el('button', {
    style: {
      background: 'transparent',
      border: 'none',
      color: '#000',
      width: '36px', height: '36px',
      fontSize: '24px',
      cursor: 'pointer',
      pointerEvents: 'auto',
      lineHeight: '1',
      padding: '0',
      fontFamily: "'DM Mono', monospace",
      opacity: '0.55'
    },
    onclick: (e) => {
      e.stopPropagation();
      closeFullscreenTimer();
    }
  }, '×');
  topBar.appendChild(closeBtn);

  const kindLabel = kind === 'hold' ? 'HOLD' : 'REST';
  topBar.appendChild(el('div', {
    id: 'fs-kind',
    style: {
      fontSize: '9px',
      color: '#000',
      letterSpacing: '0.4em',
      fontWeight: '700',
      pointerEvents: 'none',
      fontFamily: "'DM Mono', monospace",
      opacity: '0.7'
    }
  }, kindLabel));

  topBar.appendChild(div({width:'36px'}));
  overlay.appendChild(topBar);

  // Description label
  overlay.appendChild(el('div', {
    style: {
      fontSize: '10px',
      color: '#000',
      letterSpacing: '0.18em',
      textTransform: 'uppercase',
      marginBottom: '32px',
      textAlign: 'center',
      maxWidth: '280px',
      lineHeight: '1.5',
      fontFamily: "'DM Mono', monospace",
      opacity: '0.65'
    }
  }, description.length > 60 ? description.substring(0, 57) + '…' : description));

  // Dial
  const dialSize = Math.min(window.innerWidth * 0.74, 380);
  const dialWrap = div({
    position: 'relative',
    width: dialSize + 'px',
    height: dialSize + 'px',
    display: 'flex',
    alignItems: 'center',
    justifyContent: 'center'
  });

  const radius = (dialSize / 2) - 18;
  const circumference = 2 * Math.PI * radius;
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('width', dialSize);
  svg.setAttribute('height', dialSize);
  svg.style.position = 'absolute';
  svg.style.top = '0';
  svg.style.left = '0';
  // SVG starts at 12 o'clock by default with this rotation
  svg.style.transform = 'rotate(-90deg)';

  // ─── TOTEM RING ─────────────────────────────────────────────────────────
  // Custom tribal-minimalist countdown ring: 60 radial bars, every 5th heavier,
  // cardinal anchor glyphs at 12/3/6/9. Bars deplete from the trailing edge as
  // time passes, fading to ghost-marks (15% opacity) so the pattern remains
  // visible as a static totem while the active arc is unmistakable.
  const cx = dialSize / 2, cy = dialSize / 2;
  const BAR_COUNT = 60;
  const ringBars = []; // refs for tick-time updates
  const innerRadius = radius - 6;   // base bar inner edge
  const outerRadius = radius + 6;   // base bar outer edge
  const heavyExtra = 4;              // extra length for every-5th bar

  for (let i = 0; i < BAR_COUNT; i++) {
    const angle = (i / BAR_COUNT) * 2 * Math.PI;
    const isHeavy = i % 5 === 0;
    const isCardinal = i === 0 || i === 15 || i === 30 || i === 45;
    // Cardinal positions get a custom glyph (handled below); skip drawing a bar there
    if (isCardinal) continue;

    const r1 = innerRadius;
    const r2 = outerRadius + (isHeavy ? heavyExtra : 0);
    const x1 = cx + r1 * Math.cos(angle);
    const y1 = cy + r1 * Math.sin(angle);
    const x2 = cx + r2 * Math.cos(angle);
    const y2 = cy + r2 * Math.sin(angle);

    const bar = document.createElementNS(svgNS, 'line');
    bar.setAttribute('x1', x1); bar.setAttribute('y1', y1);
    bar.setAttribute('x2', x2); bar.setAttribute('y2', y2);
    bar.setAttribute('stroke', '#000');
    bar.setAttribute('stroke-width', isHeavy ? '3' : '2');
    bar.setAttribute('stroke-linecap', 'round');
    bar.setAttribute('opacity', '1');
    bar.style.transition = 'opacity 0.4s ease, stroke-width 0.3s';
    svg.appendChild(bar);
    ringBars.push({el: bar, index: i, isHeavy: isHeavy});
  }

  // Cardinal anchor glyphs — replace bars at 12/3/6/9 with totemic markers
  // 12 o'clock (top): solid downward triangle pointing inward
  // 6 o'clock (bottom): solid upward triangle pointing inward
  // 3 and 9: stacked twin squares (asymmetric character)
  const drawTriangle = (centerX, centerY, dir) => {
    // dir: 'down' for top (points inward), 'up' for bottom (points inward)
    const s = 8;
    const tip = dir === 'down' ? [centerX, centerY + s] : [centerX, centerY - s];
    const left = dir === 'down' ? [centerX - s, centerY - s] : [centerX - s, centerY + s];
    const right = dir === 'down' ? [centerX + s, centerY - s] : [centerX + s, centerY + s];
    const tri = document.createElementNS(svgNS, 'polygon');
    tri.setAttribute('points', `${tip[0]},${tip[1]} ${left[0]},${left[1]} ${right[0]},${right[1]}`);
    tri.setAttribute('fill', '#000');
    return tri;
  };
  const drawTwinSquares = (centerX, centerY, isHorizontal) => {
    // A pair of stacked squares — asymmetric totemic anchor
    const g = document.createElementNS(svgNS, 'g');
    const big = document.createElementNS(svgNS, 'rect');
    const small = document.createElementNS(svgNS, 'rect');
    if (isHorizontal) {
      // 3 or 9 o'clock — squares stacked horizontally
      big.setAttribute('x', centerX - 7); big.setAttribute('y', centerY - 4);
      big.setAttribute('width', 8); big.setAttribute('height', 8);
      small.setAttribute('x', centerX + 3); small.setAttribute('y', centerY - 2);
      small.setAttribute('width', 4); small.setAttribute('height', 4);
    }
    big.setAttribute('fill', '#000');
    small.setAttribute('fill', '#000');
    g.appendChild(big); g.appendChild(small);
    return g;
  };

  // 12 o'clock: triangle pointing toward centre (downward, since 12 is at top)
  svg.appendChild(drawTriangle(cx, cy - outerRadius - heavyExtra, 'down'));
  // 6 o'clock: triangle pointing toward centre (upward, since 6 is at bottom)
  svg.appendChild(drawTriangle(cx, cy + outerRadius + heavyExtra, 'up'));
  // 3 o'clock: twin squares (right side)
  svg.appendChild(drawTwinSquares(cx + outerRadius + heavyExtra, cy, true));
  // 9 o'clock: twin squares mirrored (left side)
  const leftTwin = drawTwinSquares(cx, cy, true);
  // Mirror by flipping x — easier to redraw than transform
  while (leftTwin.firstChild) leftTwin.removeChild(leftTwin.firstChild);
  const big9 = document.createElementNS(svgNS, 'rect');
  big9.setAttribute('x', cx - outerRadius - heavyExtra - 1);
  big9.setAttribute('y', cy - 4);
  big9.setAttribute('width', 8); big9.setAttribute('height', 8);
  big9.setAttribute('fill', '#000');
  const small9 = document.createElementNS(svgNS, 'rect');
  small9.setAttribute('x', cx - outerRadius - heavyExtra - 7);
  small9.setAttribute('y', cy - 2);
  small9.setAttribute('width', 4); small9.setAttribute('height', 4);
  small9.setAttribute('fill', '#000');
  leftTwin.appendChild(big9); leftTwin.appendChild(small9);
  svg.appendChild(leftTwin);

  // Hidden progCircle kept in state for compatibility — we won't render it,
  // but fsTick still computes circumference-based progress. We use ringBars instead.
  const progCircle = { setAttribute: () => {}, style: {} }; // stub for legacy code paths
  
  dialWrap.appendChild(svg);

  // Inner content — number in black Bebas
  const inner = div({
    position: 'relative',
    zIndex: '2',
    display: 'flex',
    flexDirection: 'column',
    alignItems: 'center',
    gap: '8px'
  });
  const numberEl = el('div', {
    id: 'fs-number',
    style: {
      fontFamily: "'Anton', 'Bebas Neue', sans-serif",
      fontSize: Math.floor(dialSize * 0.36) + 'px',
      color: '#000',
      letterSpacing: '-0.01em',
      lineHeight: '1',
      fontWeight: '400',
      WebkitTextStroke: '1px #000',
      textTransform: 'none'
    }
  }, formatTimerDisplay(totalSec));
  inner.appendChild(numberEl);
  inner.appendChild(el('div', {
    id: 'fs-state',
    style: {
      fontSize: '9px',
      color: '#000',
      letterSpacing: '0.3em',
      textTransform: 'uppercase',
      fontFamily: "'DM Mono', monospace",
      fontWeight: '700',
      opacity: '0.5'
    }
  }, 'TAP TO START'));
  dialWrap.appendChild(inner);
  overlay.appendChild(dialWrap);

  // Bottom hint
  overlay.appendChild(el('div', {
    id: 'fs-hint',
    style: {
      position: 'absolute',
      bottom: 'calc(env(safe-area-inset-bottom, 16px) + 32px)',
      left: '0', right: '0',
      textAlign: 'center',
      fontSize: '8px',
      color: '#000',
      letterSpacing: '0.28em',
      textTransform: 'uppercase',
      fontFamily: "'DM Mono', monospace",
      opacity: '0.4'
    }
  }, 'TAP TO START  ·  HOLD TO CANCEL'));

  // Press handlers
  let pressTimer = null;
  overlay.addEventListener('pointerdown', (e) => {
    if (e.target === closeBtn || closeBtn.contains(e.target)) return;
    pressTimer = setTimeout(() => {
      pressTimer = null;
      if (navigator.vibrate) { try { navigator.vibrate(40); } catch(_){} }
      closeFullscreenTimer();
    }, 700);
  });
  overlay.addEventListener('pointerup', (e) => {
    if (e.target === closeBtn || closeBtn.contains(e.target)) return;
    if (pressTimer) {
      clearTimeout(pressTimer);
      pressTimer = null;
      handleFsTap();
    }
  });
  overlay.addEventListener('pointercancel', () => {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
  });
  overlay.addEventListener('pointerleave', () => {
    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
  });

  document.body.appendChild(overlay);

  fsTimerState = {
    totalSec: totalSec,
    remainingSec: totalSec,
    isRunning: false,
    isPaused: false,
    inChainBuffer: false,
    intervalId: null,
    bufferIntervalId: null,
    accent: accent,
    fillColor: fillColor,
    kind: kind,
    description: description,
    progCircle: progCircle,
    circumference: circumference,
    ringBars: ringBars,
    barCount: BAR_COUNT,
    wakeLock: null,
    hasBeepedAt: {},
    chainTo: chainTo || null
  };
}

function handleFsTap() {
  if (!fsTimerState) return;
  if (fsTimerState.inChainBuffer) {
    skipChainBuffer();
    return;
  }
  if (!fsTimerState.isRunning) {
    fsStart();
  } else if (fsTimerState.isPaused) {
    fsResume();
  } else {
    fsPause();
  }
}

async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return null;
  try {
    return await navigator.wakeLock.request('screen');
  } catch (e) {
    return null;
  }
}

async function fsStart() {
  if (!fsTimerState) return;
  fsTimerState.isRunning = true;
  fsTimerState.isPaused = false;
  fsTimerState.startedAt = Date.now();
  fsTimerState.endAt = Date.now() + (fsTimerState.remainingSec * 1000);
  fsTimerState.hasBeepedAt = {};

  fsTimerState.wakeLock = await requestWakeLock();

  const stateEl = document.getElementById('fs-state');
  if (stateEl) { stateEl.textContent = 'IN PROGRESS'; stateEl.style.opacity = '0.7'; }

  const hintEl = document.getElementById('fs-hint');
  if (hintEl) hintEl.textContent = 'TAP TO PAUSE  ·  HOLD TO CANCEL';

  fsTick();
  fsTimerState.intervalId = setInterval(fsTick, 200);
}

function fsPause() {
  if (!fsTimerState || !fsTimerState.isRunning || fsTimerState.isPaused) return;
  fsTimerState.isPaused = true;
  fsTimerState.remainingSec = Math.max(0, Math.round((fsTimerState.endAt - Date.now()) / 1000));
  if (fsTimerState.intervalId) clearInterval(fsTimerState.intervalId);
  fsTimerState.intervalId = null;

  const stateEl = document.getElementById('fs-state');
  if (stateEl) stateEl.textContent = 'PAUSED · TAP TO RESUME';
  // Pulse the active bars by reducing their opacity — paused but recoverable
  if (fsTimerState.ringBars) {
    fsTimerState.ringBars.forEach(({el, index}) => {
      if (parseFloat(el.getAttribute('opacity')) > 0.5) {
        el.setAttribute('opacity', '0.45');
      }
    });
  }
}

function fsResume() {
  if (!fsTimerState || !fsTimerState.isPaused) return;
  fsTimerState.isPaused = false;
  fsTimerState.endAt = Date.now() + (fsTimerState.remainingSec * 1000);
  // Restore active bars to full opacity (fsTick will refine on next tick)
  if (fsTimerState.ringBars) {
    fsTimerState.ringBars.forEach(({el}) => {
      if (parseFloat(el.getAttribute('opacity')) > 0.2) {
        el.setAttribute('opacity', '1');
      }
    });
  }
  const stateEl = document.getElementById('fs-state');
  if (stateEl) stateEl.textContent = 'IN PROGRESS';
  fsTick();
  fsTimerState.intervalId = setInterval(fsTick, 200);
}

function fsTick() {
  if (!fsTimerState || fsTimerState.isPaused || fsTimerState.inChainBuffer) return;
  const remaining = Math.max(0, Math.round((fsTimerState.endAt - Date.now()) / 1000));
  fsTimerState.remainingSec = remaining;

  const numEl = document.getElementById('fs-number');
  if (numEl) numEl.textContent = formatTimerDisplay(remaining);

  // ─── TOTEM RING UPDATE ──────────────────────────────────────────────────
  // Bars deplete proportionally. The ACTIVE arc (bars still 'alive' at full
  // opacity) shrinks counterclockwise as time elapses. Depleted bars fade to
  // 15% opacity — they remain visible as ghost-marks, preserving the totem.
  if (fsTimerState.ringBars && fsTimerState.totalSec > 0) {
    const fractionElapsed = (fsTimerState.totalSec - remaining) / fsTimerState.totalSec;
    const totalBars = fsTimerState.barCount; // 60 (slots, not actual bar count due to cardinal gaps)
    // We rendered 60 slots minus 4 cardinal positions = 56 bars in ringBars.
    // For depletion we use the slot index (0..59) so cardinal gaps remain
    // visually consistent with the 60-second/12-position clock metaphor.
    const slotsPassed = Math.floor(fractionElapsed * totalBars);
    fsTimerState.ringBars.forEach(({el, index, isHeavy}) => {
      // index is the slot index (0..59), incrementing clockwise from 12
      const isDepleted = index < slotsPassed;
      el.setAttribute('opacity', isDepleted ? '0.15' : '1');
      // Last 5 seconds: active bars get a touch heavier — totem "breathing" before completion
      if (remaining <= 5 && remaining > 0 && !isDepleted) {
        el.setAttribute('stroke-width', isHeavy ? '4' : '3');
      } else {
        el.setAttribute('stroke-width', isHeavy ? '3' : '2');
      }
    });
  }

  // Countdown blips for HOLDs only
  if (fsTimerState.kind === 'hold' && remaining > 0 && remaining <= 3 && !fsTimerState.hasBeepedAt[remaining]) {
    fsTimerState.hasBeepedAt[remaining] = true;
    playCountdownBlip();
  }

  if (remaining <= 0) {
    fsFinish();
  }
}

function playCountdownBlip() {
  const ctx = ensureAudioCtx();
  if (!ctx) return;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 660;
  const now = ctx.currentTime;
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.18, now + 0.01);
  gain.gain.linearRampToValueAtTime(0, now + 0.12);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(now);
  osc.stop(now + 0.12);
  if (navigator.vibrate) { try { navigator.vibrate(35); } catch(_){} }
}

function fsFinish() {
  if (!fsTimerState) return;
  if (fsTimerState.intervalId) clearInterval(fsTimerState.intervalId);
  fsTimerState.intervalId = null;
  fsTimerState.isRunning = false;

  // At completion: restore the full totem — all bars bright, the pattern whole again.
  if (fsTimerState.ringBars) {
    fsTimerState.ringBars.forEach(({el, isHeavy}) => {
      el.setAttribute('opacity', '1');
      el.setAttribute('stroke-width', isHeavy ? '4' : '3');
    });
  }
  const numEl = document.getElementById('fs-number');
  if (numEl) {
    numEl.textContent = '✓';
    numEl.style.transition = 'transform 0.4s';
    numEl.style.transform = 'scale(1.06)';
  }
  const stateEl = document.getElementById('fs-state');
  if (stateEl) {
    stateEl.textContent = 'COMPLETE';
    stateEl.style.opacity = '0.7';
  }

  // Sound: REST ending = "begin next set" (start tone). HOLD ending = "release" (alarm).
  if (fsTimerState.kind === 'rest') {
    playStartTone();
  } else {
    playAlarmBeep();
  }
  maybeShowNotification(fsTimerState.description);

  // HOLD → REST chain if queued
  if (fsTimerState.chainTo && fsTimerState.kind === 'hold') {
    setTimeout(() => enterChainBuffer(), 800);
  } else {
    setTimeout(() => closeFullscreenTimer(), 2500);
  }
}

function enterChainBuffer() {
  if (!fsTimerState || !fsTimerState.chainTo) return;
  fsTimerState.inChainBuffer = true;
  let bufferRemaining = 5;

  const stateEl = document.getElementById('fs-state');
  const numEl = document.getElementById('fs-number');
  const hintEl = document.getElementById('fs-hint');
  const kindEl = document.getElementById('fs-kind');
  const overlay = document.getElementById('fs-timer-overlay');
  if (kindEl) kindEl.textContent = 'REST IN';
  if (hintEl) hintEl.textContent = 'TAP TO SKIP  ·  HOLD TO CANCEL';
  if (numEl) numEl.style.transform = 'scale(1)';

  // Visually shift from HOLD-yellow → REST-teal during the buffer so the mode change is felt
  if (overlay) {
    overlay.style.transition = 'background 0.8s ease';
    overlay.style.background = TIMER_PALETTE.rest;
  }

  const updateBuffer = () => {
    if (!fsTimerState || !fsTimerState.inChainBuffer) return;
    if (stateEl) stateEl.textContent = 'STARTING REST · ' + bufferRemaining + 's';
    if (numEl) numEl.textContent = bufferRemaining + '';
    bufferRemaining--;
    if (bufferRemaining < 0) {
      transitionToChainedTimer();
    }
  };

  updateBuffer();
  fsTimerState.bufferIntervalId = setInterval(updateBuffer, 1000);
}

function skipChainBuffer() {
  if (!fsTimerState || !fsTimerState.inChainBuffer) return;
  if (fsTimerState.bufferIntervalId) clearInterval(fsTimerState.bufferIntervalId);
  transitionToChainedTimer();
}

function transitionToChainedTimer() {
  if (!fsTimerState || !fsTimerState.chainTo) {
    closeFullscreenTimer();
    return;
  }
  if (fsTimerState.bufferIntervalId) clearInterval(fsTimerState.bufferIntervalId);
  const chain = fsTimerState.chainTo;
  if (fsTimerState.wakeLock) {
    try { fsTimerState.wakeLock.release(); } catch(_){}
  }
  // Brief pause so the morph feels intentional
  setTimeout(() => {
    closeFullscreenTimer();
    openFullscreenTimer(chain.sec, chain.description, chain.accent, 'rest', null);
    setTimeout(() => { if (fsTimerState) fsStart(); }, 100);
  }, 200);
}

function closeFullscreenTimer() {
  if (fsTimerState) {
    if (fsTimerState.intervalId) clearInterval(fsTimerState.intervalId);
    if (fsTimerState.bufferIntervalId) clearInterval(fsTimerState.bufferIntervalId);
    if (fsTimerState.wakeLock) {
      try { fsTimerState.wakeLock.release(); } catch(_){}
    }
  }
  fsTimerState = null;
  const existing = document.getElementById('fs-timer-overlay');
  if (existing) existing.remove();
}

// ─── WORKOUT MODE ─────────────────────────────────────────────────────────────
// A guided, phase-driven session flow: countdown → working → rest → input → next.
// Persists state to localStorage on every phase change so exits are resumable.
// Writes set data to the same storage keys as manual mode.

let wmState = null;       // active session object (null when not in workout mode)
let wmTickIntervalId = null;
let wmWakeLock = null;

const WM_PALETTE = {
  countdown: '#6aff3b',  // pre-start 5-2-1 green
  working:   '#f0ff00',  // active set / hold — sport yellow
  rest:      '#00d4aa',  // rest timer — mint teal
  prep:      '#c8f5b8',  // prep / summary screens — soft mint, calm but in-mode
  setDone:   '#6aff3b'   // brief green flash at set finish
};

// Saved-session storage key for current day & week
function wmStorageKey() {
  const day = PROGRAM[activeDay];
  return wmSessionKey(day.day);
}

// Persist current state. Called after every phase transition.
function wmPersist() {
  if (!wmState) return;
  // Strip non-serializable bits (DOM refs, intervals, wakelock)
  const snap = {
    dayNum: wmState.dayNum,
    weekOffset: wmState.weekOffset,
    exIndex: wmState.exIndex,
    setIndex: wmState.setIndex,
    phase: wmState.phase,
    currentWeight: wmState.currentWeight,
    workingStartTime: wmState.workingStartTime,
    restEndTime: wmState.restEndTime,
    countdownEndTime: wmState.countdownEndTime,
    holdEndTime: wmState.holdEndTime,
    sessionStartTime: wmState.sessionStartTime,
    perExerciseLogs: wmState.perExerciseLogs,
    pendingReps: wmState.pendingReps,
    pendingFeedback: wmState.pendingFeedback,
    pausedAt: wmState.pausedAt
  };
  try { localStorage.setItem(wmStorageKey(), JSON.stringify(snap)); } catch(e) {}
}

function wmClearPersisted() {
  try { localStorage.removeItem(wmStorageKey()); } catch(e) {}
}

function wmLoadPersisted() {
  try {
    const raw = localStorage.getItem(wmStorageKey());
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

// Has-saved-session check — used to show "Resume Workout" instead of "Start Workout"
function wmHasSavedSession() {
  const s = wmLoadPersisted();
  if (!s) return false;
  // Sanity: must match current viewing day & week
  const day = PROGRAM[activeDay];
  return s.dayNum === day.day && s.weekOffset === weekOffset && s.phase !== 'complete';
}

// ─── PHASE CONTROLLER ─────────────────────────────────────────────────────────

function wmStartNewSession() {
  const day = PROGRAM[activeDay];
  if (!day.exercises || day.exercises.length === 0) return;
  wmState = {
    dayNum: day.day,
    weekOffset: weekOffset,
    exIndex: 0,
    setIndex: 0,
    phase: 'weight-setup',  // initial phase: confirm weight before starting
    currentWeight: null,    // populated below
    sessionStartTime: Date.now(),
    perExerciseLogs: {},    // {exId: [{weight, reps, feedback, durationSec}, ...]}
    pendingReps: null,
    pendingFeedback: null,
    pausedAt: null
  };
  // Pre-fill currentWeight from last session if available
  const ex = day.exercises[0];
  const prev = getPreviousExerciseLog(day.day, ex.id);
  if (prev && prev.sets && prev.sets[0] && prev.sets[0].weight) {
    wmState.currentWeight = parseFloat(prev.sets[0].weight) || 0;
  } else {
    wmState.currentWeight = 0;
  }
  wmPersist();
  wmRender();
  wmRequestWakeLock();
}

function wmResumeSession() {
  const saved = wmLoadPersisted();
  if (!saved) return;
  wmState = saved;
  // If we were in a time-based phase, treat the resume as a paused state and
  // require the user to tap to continue. We don't auto-fast-forward elapsed time.
  if (['countdown', 'working-duration', 'rest'].indexOf(wmState.phase) >= 0) {
    wmState.pausedAt = Date.now();
  }
  wmRender();
  wmRequestWakeLock();
}

function wmExitSession(persist) {
  if (wmTickIntervalId) clearInterval(wmTickIntervalId);
  wmTickIntervalId = null;
  if (wmWakeLock) { try { wmWakeLock.release(); } catch(_){} wmWakeLock = null; }
  if (persist && wmState && wmState.phase !== 'complete') {
    wmState.pausedAt = Date.now();
    wmPersist();
  } else if (!persist) {
    wmClearPersisted();
  }
  const overlay = document.getElementById('wm-overlay');
  if (overlay) overlay.remove();
  wmState = null;
  render();
}

// Reset session — restart workout from beginning. Optionally wipe logged data
// for this day's workout (so it's truly a clean slate, not just a re-traverse).
async function wmResetSession() {
  if (!wmState) return;
  // Single confirm — session data isn't in workout storage yet so resetting just
  // wipes the in-progress session. Nothing in your workout log is affected.
  const restartOk = await showConfirm(
    'Reset workout to the start? You\'ll begin from Exercise 1, Set 1. Your workout log isn\'t affected.',
    {title:'Reset Workout', confirmLabel:'Reset', destructive:true}
  );
  if (!restartOk) return;

  const day = PROGRAM[activeDay];

  // Build a fresh state object — same dayNum/weekOffset, exIndex/setIndex back to 0
  if (wmTickIntervalId) clearInterval(wmTickIntervalId);
  wmTickIntervalId = null;
  wmClearPersisted();

  const ex = day.exercises[0];
  const prev = getPreviousExerciseLog(day.day, ex.id);
  const startWeight = (prev && prev.sets && prev.sets[0] && prev.sets[0].weight)
    ? parseFloat(prev.sets[0].weight) || 0
    : 0;

  wmState = {
    dayNum: day.day,
    weekOffset: weekOffset,
    exIndex: 0,
    setIndex: 0,
    phase: 'weight-setup',
    currentWeight: startWeight,
    sessionStartTime: Date.now(),
    perExerciseLogs: {},
    pendingReps: null,
    pendingFeedback: null,
    pausedAt: null
  };
  wmPersist();
  wmRender();
}

async function wmRequestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try { wmWakeLock = await navigator.wakeLock.request('screen'); } catch(_){}
}

// Move to the next phase in the flow given current context
// Skip the current exercise — preserves any sets already logged this session
// for the current exercise, then jumps to the next exercise's weight-setup
// (or workout-summary if this was the last exercise).
async function wmSkipExercise() {
  if (!wmState) return;
  const day = PROGRAM[activeDay];
  const ex = day.exercises[wmState.exIndex];
  const sets = wmState.perExerciseLogs[ex.id] || [];
  const filledCount = sets.filter(Boolean).length;
  const message = filledCount > 0
    ? 'Skip ' + ex.name + '? Your ' + filledCount + ' logged set' + (filledCount === 1 ? '' : 's') + ' will be kept.'
    : 'Skip ' + ex.name + '? You haven\'t logged any sets for it.';
  const ok = await showConfirm(message, {title:'Skip Exercise', confirmLabel:'Skip', destructive:false});
  if (!ok) return;

  if (wmTickIntervalId) clearInterval(wmTickIntervalId);
  wmTickIntervalId = null;

  const isLastExercise = wmState.exIndex >= day.exercises.length - 1;
  if (isLastExercise) {
    wmState.phase = 'workout-summary';
  } else {
    wmState.exIndex++;
    wmState.setIndex = 0;
    const nextEx = day.exercises[wmState.exIndex];
    const prev = getPreviousExerciseLog(day.day, nextEx.id);
    wmState.currentWeight = (prev && prev.sets && prev.sets[0] && prev.sets[0].weight)
      ? parseFloat(prev.sets[0].weight) || 0 : 0;
    wmState.phase = 'weight-setup';
  }
  wmState.pendingReps = null;
  wmState.pendingFeedback = null;
  wmPersist();
  wmRender();
}

// Go back to the previous exercise — only available if exIndex > 0.
// Discards any in-progress logs for the CURRENT exercise (with confirm).
async function wmGoBackExercise() {
  if (!wmState || wmState.exIndex <= 0) return;
  const day = PROGRAM[activeDay];
  const curEx = day.exercises[wmState.exIndex];
  const curSets = wmState.perExerciseLogs[curEx.id] || [];
  const filledCount = curSets.filter(Boolean).length;
  const message = filledCount > 0
    ? 'Go back to the previous exercise? Your ' + filledCount + ' logged set' + (filledCount === 1 ? '' : 's') + ' for ' + curEx.name + ' will be discarded.'
    : 'Go back to the previous exercise?';
  const ok = await showConfirm(message, {title:'Go Back', confirmLabel:'Go Back', destructive: filledCount > 0});
  if (!ok) return;

  if (wmTickIntervalId) clearInterval(wmTickIntervalId);
  wmTickIntervalId = null;

  // Discard current exercise's session log
  delete wmState.perExerciseLogs[curEx.id];

  wmState.exIndex--;
  wmState.setIndex = 0;
  const prevEx = day.exercises[wmState.exIndex];
  // Re-enter the previous exercise from weight-setup, dropping its session log
  // so the user can redo it cleanly. Old logs from prior weeks still load via
  // getPreviousExerciseLog for placeholder/progression hints.
  delete wmState.perExerciseLogs[prevEx.id];
  const prev = getPreviousExerciseLog(day.day, prevEx.id);
  wmState.currentWeight = (prev && prev.sets && prev.sets[0] && prev.sets[0].weight)
    ? parseFloat(prev.sets[0].weight) || 0 : 0;
  wmState.phase = 'weight-setup';
  wmState.pendingReps = null;
  wmState.pendingFeedback = null;
  wmPersist();
  wmRender();
}

function wmAdvance() {
  if (!wmState) return;
  const day = PROGRAM[activeDay];
  const ex = day.exercises[wmState.exIndex];
  const isHoldExercise = !!parseDurationFromReps(ex.reps);
  const restSec = getDefaultRestSec(ex);

  switch (wmState.phase) {
    case 'weight-setup': {
      // Begin countdown to start
      wmState.phase = 'countdown';
      wmState.countdownEndTime = Date.now() + 5000;
      break;
    }
    case 'countdown': {
      // Move into the working phase
      if (isHoldExercise) {
        const sec = parseDurationFromReps(ex.reps);
        wmState.phase = 'working-duration';
        wmState.holdEndTime = Date.now() + (sec * 1000);
      } else {
        wmState.phase = 'working-rolling';
        wmState.workingStartTime = Date.now();
      }
      break;
    }
    case 'working-rolling':
    case 'working-duration': {
      // Set is finished — go into rest phase
      wmState.phase = 'rest';
      wmState.restEndTime = Date.now() + (restSec * 1000);
      // For rolling-weight exercises, we'll prompt for reps during the rest
      if (!isHoldExercise) {
        wmState.pendingReps = '';
      }
      break;
    }
    case 'rest': {
      // Rest done — go straight to either summary or next set's countdown.
      // (Weight adjustment now happens DURING rest, not in a separate phase.)
      const isLastSet = wmState.setIndex >= ex.sets - 1;
      if (isLastSet) {
        wmState.phase = 'exercise-summary';
      } else {
        wmState.setIndex++;
        wmState.phase = 'countdown';
        wmState.countdownEndTime = Date.now() + 5000;
      }
      break;
    }
    case 'weight-confirm': {
      // Legacy — kept for backward compatibility with any saved sessions
      // mid-flow before this update. Just advance to countdown.
      wmState.phase = 'countdown';
      wmState.countdownEndTime = Date.now() + 5000;
      break;
    }
    case 'exercise-summary': {
      // Move to next exercise
      const isLastExercise = wmState.exIndex >= day.exercises.length - 1;
      if (isLastExercise) {
        wmState.phase = 'workout-summary';
      } else {
        wmState.exIndex++;
        wmState.setIndex = 0;
        const nextEx = day.exercises[wmState.exIndex];
        const prev = getPreviousExerciseLog(day.day, nextEx.id);
        if (prev && prev.sets && prev.sets[0] && prev.sets[0].weight) {
          wmState.currentWeight = parseFloat(prev.sets[0].weight) || 0;
        } else {
          wmState.currentWeight = 0;
        }
        wmState.phase = 'weight-setup';
      }
      break;
    }
    case 'workout-summary': {
      wmState.phase = 'complete';
      break;
    }
  }
  wmPersist();
  wmRender();
}

// Record the just-completed set into perExerciseLogs and persist to workout storage
function wmCommitSet(repsOrDuration, feedback, durationSec) {
  if (!wmState) return;
  const day = PROGRAM[activeDay];
  const ex = day.exercises[wmState.exIndex];
  if (!wmState.perExerciseLogs[ex.id]) wmState.perExerciseLogs[ex.id] = [];
  const setRecord = {
    weight: wmState.currentWeight + '',
    reps: repsOrDuration + '',
    note: feedback || '',
    durationSec: durationSec || null
  };
  wmState.perExerciseLogs[ex.id][wmState.setIndex] = setRecord;
  // NOTE: We no longer mirror to main workout storage on every set.
  // Storage is deferred until wmFlushToWorkoutStorage() runs at Finish.
  // This means: exits/resets mid-session don't pollute the workout log.
  wmPersist();
}

// Called when the user taps "Finish Workout" — flushes everything from
// session perExerciseLogs into the underlying workout storage in one batch.
function wmFlushToWorkoutStorage() {
  if (!wmState) return;
  const day = PROGRAM[activeDay];
  const cur = getWorkoutLog(day.day);
  const next = {...cur};
  Object.keys(wmState.perExerciseLogs).forEach(exId => {
    const sessionSets = wmState.perExerciseLogs[exId] || [];
    const cleanSets = sessionSets.filter(Boolean).map(s => ({
      weight: s.weight,
      reps: s.reps,
      note: s.note
    }));
    if (cleanSets.length === 0) return;
    next[exId] = {sets: cleanSets};
  });
  saveData('workout', day.day, next);
}

// ─── RENDERING ────────────────────────────────────────────────────────────────

function wmRender() {
  // Stop any running tick interval; phases that need ticking will start their own
  if (wmTickIntervalId) clearInterval(wmTickIntervalId);
  wmTickIntervalId = null;

  // Build/replace overlay
  let overlay = document.getElementById('wm-overlay');
  if (!overlay) {
    overlay = el('div', {
      id: 'wm-overlay',
      style: {
        position: 'fixed',
        top: '0', left: '0', right: '0', bottom: '0',
        zIndex: '6000',
        background: '#080808',
        overflow: 'auto',
        WebkitOverflowScrolling: 'touch'
      }
    });
    document.body.appendChild(overlay);
  }
  overlay.innerHTML = '';

  if (!wmState) return;
  const day = PROGRAM[activeDay];
  const ex = day.exercises[wmState.exIndex];

  // Top bar — always present, with exit + exercise progress
  const topBar = wmBuildTopBar(day, ex);
  // Adapt overlay background to phase
  const phase = wmState.phase;
  const isPrep = ['weight-setup','weight-confirm','exercise-summary','workout-summary'].indexOf(phase) >= 0;
  overlay.style.background = isPrep ? WM_PALETTE.prep : '#080808';
  overlay.style.transition = 'background 0.4s ease';

  overlay.appendChild(topBar);

  // Phase-specific body
  const body = div({
    padding: '20px 18px 32px',
    maxWidth: '600px',
    margin: '0 auto',
    background: isPrep ? WM_PALETTE.prep : 'transparent',
    transition: 'background 0.4s ease'
  });
  switch (wmState.phase) {
    case 'weight-setup':       body.appendChild(wmRenderWeightSetup(ex)); break;
    case 'weight-confirm':     body.appendChild(wmRenderWeightConfirm(ex)); break;
    case 'countdown':          body.appendChild(wmRenderCountdown(ex)); break;
    case 'working-rolling':    body.appendChild(wmRenderRolling(ex)); break;
    case 'working-duration':   body.appendChild(wmRenderDuration(ex)); break;
    case 'rest':               body.appendChild(wmRenderRest(ex)); break;
    case 'exercise-summary':   body.appendChild(wmRenderExerciseSummary(ex)); break;
    case 'workout-summary':    body.appendChild(wmRenderWorkoutSummary(day)); break;
    default:                   body.appendChild(wmRenderWeightSetup(ex)); break;
  }
  overlay.appendChild(body);
}

function wmBuildTopBar(day, ex) {
  // Phase-aware top bar — matches whatever colour lives below it
  const phase = wmState ? wmState.phase : '';
  const isPrep = ['weight-setup','weight-confirm','exercise-summary','workout-summary'].indexOf(phase) >= 0;
  const isCountdown = phase === 'countdown';
  const isWorking = phase === 'working-rolling' || phase === 'working-duration';
  const isRest = phase === 'rest';

  let bg, fg, mutedFg, exitBg, exitBorder, exitFg, sublabelColor;
  if (isPrep) {
    bg = WM_PALETTE.prep; fg = '#000'; mutedFg = 'rgba(0,0,0,0.55)';
    exitBg = 'rgba(0,0,0,0.08)'; exitBorder = 'rgba(0,0,0,0.25)'; exitFg = '#000';
    sublabelColor = 'rgba(0,0,0,0.7)';
  } else if (isCountdown) {
    bg = WM_PALETTE.countdown; fg = '#000'; mutedFg = 'rgba(0,0,0,0.55)';
    exitBg = 'rgba(0,0,0,0.1)'; exitBorder = 'rgba(0,0,0,0.3)'; exitFg = '#000';
    sublabelColor = 'rgba(0,0,0,0.7)';
  } else if (isWorking) {
    bg = WM_PALETTE.working; fg = '#000'; mutedFg = 'rgba(0,0,0,0.55)';
    exitBg = 'rgba(0,0,0,0.1)'; exitBorder = 'rgba(0,0,0,0.3)'; exitFg = '#000';
    sublabelColor = 'rgba(0,0,0,0.7)';
  } else if (isRest) {
    bg = WM_PALETTE.rest; fg = '#000'; mutedFg = 'rgba(0,0,0,0.55)';
    exitBg = 'rgba(0,0,0,0.1)'; exitBorder = 'rgba(0,0,0,0.3)'; exitFg = '#000';
    sublabelColor = 'rgba(0,0,0,0.7)';
  } else {
    bg = '#080808'; fg = '#aaa'; mutedFg = '#444';
    exitBg = 'transparent'; exitBorder = '#2a2a2a'; exitFg = '#666';
    sublabelColor = '#aaa';
  }

  const bar = div({
    position: 'sticky', top: '0', left: '0', right: '0',
    background: bg,
    borderBottom: isPrep ? '1px solid rgba(0,0,0,0.12)' : (isCountdown || isWorking || isRest) ? '1px solid rgba(0,0,0,0.15)' : '1px solid #161616',
    padding: 'env(safe-area-inset-top, 12px) 18px 10px',
    display: 'flex',
    justifyContent: 'space-between',
    alignItems: 'center',
    zIndex: '10',
    transition: 'background 0.4s ease, border-color 0.4s ease'
  });
  const left = div({});
  left.appendChild(el('div', {
    style: {fontSize:'7px', color: mutedFg, letterSpacing:'0.25em', textTransform:'uppercase', marginBottom:'2px', fontWeight: isPrep || isCountdown || isWorking || isRest ? '700' : '400'}
  }, 'WORKOUT MODE · ' + day.title));
  if (ex) {
    left.appendChild(el('div', {
      style: {fontSize:'10px', color: sublabelColor, fontFamily:"'DM Mono',monospace"}
    }, 'Exercise ' + (wmState.exIndex + 1) + '/' + day.exercises.length + ' · Set ' + (wmState.setIndex + 1) + '/' + ex.sets));
  }
  bar.appendChild(left);

  const exitBtn = el('button', {
    class: 'btn',
    style: {
      background: exitBg, color: exitFg, border: '1px solid ' + exitBorder,
      padding: '6px 12px', borderRadius: '6px',
      fontFamily: "'DM Mono',monospace", fontSize: '9px',
      letterSpacing: '0.15em', textTransform: 'uppercase', cursor: 'pointer',
      fontWeight: '700'
    },
    onclick: async (e) => {
      e.stopPropagation();
      const ok = await showConfirm('Exit workout? Your progress is saved and you can resume later.', {
        title: 'Exit Workout', confirmLabel: 'Exit', destructive: true
      });
      if (ok) wmExitSession(true);
    }
  }, '✕ Exit');
  bar.appendChild(exitBtn);
  return bar;
}

// PHASE: Weight Setup (initial, before first set)
function wmRenderWeightSetup(ex) {
  const isHold = !!parseDurationFromReps(ex.reps);
  const wrap = div({});

  // Exercise header card
  wrap.appendChild(wmExerciseHeaderCard(ex));

  // Skip weight-setup for hold exercises (no weight) — go straight to start
  if (isHold) {
    const startBtn = wmBigButton('Start Hold', '#000', WM_PALETTE.countdown, () => wmAdvance());
    wrap.appendChild(div({marginTop:'24px'}, startBtn));
    wrap.appendChild(wmResetButton());
    return wrap;
  }

  wrap.appendChild(wmWeightAdjuster());

  const startBtn = wmBigButton(
    wmState.currentWeight > 0 ? 'Start with ' + wmState.currentWeight + 'kg' : 'Start (Bodyweight)',
    '#000', WM_PALETTE.countdown,
    () => wmAdvance()
  );
  wrap.appendChild(div({marginTop:'24px'}, startBtn));
  wrap.appendChild(wmResetButton());
  return wrap;
}

// PHASE: Weight confirm (between sets)
function wmRenderWeightConfirm(ex) {
  const isHold = !!parseDurationFromReps(ex.reps);
  const wrap = div({});
  wrap.appendChild(wmExerciseHeaderCard(ex));
  // Show summary of previous set
  const prevSet = (wmState.perExerciseLogs[ex.id] || [])[wmState.setIndex - 1];
  if (prevSet) {
    const prevCard = div({
      background: 'rgba(255,255,255,0.4)', border: '1px solid rgba(0,0,0,0.12)',
      borderRadius: '8px', padding: '12px 14px', marginBottom: '14px'
    });
    prevCard.appendChild(el('div', {style:{fontSize:'7px',color:'rgba(0,0,0,0.55)',letterSpacing:'0.22em',textTransform:'uppercase',marginBottom:'6px',fontWeight:'700'}}, 'Previous Set'));
    prevCard.appendChild(el('div', {style:{fontSize:'14px',color:'#000',fontFamily:"'DM Mono',monospace",fontWeight:'700'}}, prevSet.weight + 'kg × ' + prevSet.reps + ' reps' + (prevSet.note ? ' · ' + prevSet.note : '')));
    wrap.appendChild(prevCard);
  }

  if (isHold) {
    const startBtn = wmBigButton('Start Next Hold', '#000', WM_PALETTE.countdown, () => wmAdvance());
    wrap.appendChild(div({marginTop:'24px'}, startBtn));
    wrap.appendChild(wmResetButton());
    return wrap;
  }

  wrap.appendChild(wmWeightAdjuster());
  const startBtn = wmBigButton(
    'Start Set ' + (wmState.setIndex + 1) + ' · ' + wmState.currentWeight + 'kg',
    '#000', WM_PALETTE.countdown,
    () => wmAdvance()
  );
  wrap.appendChild(div({marginTop:'24px'}, startBtn));
  wrap.appendChild(wmResetButton());
  return wrap;
}

// PHASE: Countdown (5 → 4 → 3 → 2 → 1 → GO)
function wmRenderCountdown(ex) {
  const wrap = wmFullCanvas(WM_PALETTE.countdown);
  wrap.appendChild(wmTopLabel('Get Ready', '#000'));
  const numEl = el('div', {
    id: 'wm-countdown-num',
    style: {
      fontFamily: "'Anton', 'Bebas Neue', sans-serif",
      fontSize: '180px', color: '#000',
      letterSpacing: '-0.02em', lineHeight: '1',
      WebkitTextStroke: '1px #000'
    }
  }, '5');
  wrap.appendChild(numEl);
  wrap.appendChild(wmBottomLabel('Tap to pause', '#000'));

  // Tick countdown
  const update = () => {
    if (!wmState || wmState.phase !== 'countdown') return;
    if (wmState.pausedAt) return;
    const remainMs = wmState.countdownEndTime - Date.now();
    const remain = Math.max(0, Math.ceil(remainMs / 1000));
    if (numEl) numEl.textContent = remain > 0 ? remain + '' : 'GO';
    // Beep on each second mark (3, 2, 1)
    if (remain > 0 && remain <= 3 && !wmState['_cdBeeped' + remain]) {
      wmState['_cdBeeped' + remain] = true;
      playCountdownBlip();
    }
    // Strong "GO" tone exactly when number flips to GO
    if (remain === 0 && !wmState._cdGoTone) {
      wmState._cdGoTone = true;
      playStartTone();
    }
    if (remainMs <= -300) {
      wmAdvance();
    }
  };
  update();
  wmTickIntervalId = setInterval(update, 100);

  // Tap to pause/resume
  wrap.addEventListener('click', () => wmTogglePause());
  return wrap;
}

// PHASE: Working — rolling timer (count UP) for weight exercises
function wmRenderRolling(ex) {
  const wrap = wmFullCanvas(WM_PALETTE.working);
  wrap.appendChild(wmTopLabel('Working · ' + (wmState.currentWeight > 0 ? wmState.currentWeight + 'kg' : 'BW'), '#000'));

  const timeEl = el('div', {
    id: 'wm-rolling-time',
    style: {
      fontFamily: "'Anton', 'Bebas Neue', sans-serif",
      fontSize: '120px', color: '#000',
      letterSpacing: '-0.02em', lineHeight: '1',
      WebkitTextStroke: '1px #000'
    }
  }, '0:00');
  wrap.appendChild(timeEl);

  wrap.appendChild(el('div', {
    style: {fontSize:'10px',color:'#000',opacity:'0.55',letterSpacing:'0.25em',textTransform:'uppercase',fontFamily:"'DM Mono',monospace",marginTop:'8px'}
  }, 'Target: ' + ex.reps + ' reps'));

  const finishBtn = wmBigButton('✓ Finish Set', '#000', WM_PALETTE.working, () => {
    const dur = Math.round((Date.now() - wmState.workingStartTime) / 1000);
    wmState._lastSetDuration = dur;
    wmAdvance();
  });
  finishBtn.style.marginTop = '40px';
  finishBtn.style.maxWidth = '280px';
  wrap.appendChild(finishBtn);

  wrap.appendChild(wmBottomLabel('Tap timer area to pause', '#000'));

  const update = () => {
    if (!wmState || wmState.phase !== 'working-rolling') return;
    if (wmState.pausedAt) return;
    const elapsed = Math.floor((Date.now() - wmState.workingStartTime) / 1000);
    if (timeEl) timeEl.textContent = formatTimerDisplay(elapsed);
  };
  update();
  wmTickIntervalId = setInterval(update, 250);

  // Pause when tapping the timer area (not the finish button)
  timeEl.addEventListener('click', (e) => { e.stopPropagation(); wmTogglePause(); });
  return wrap;
}

// PHASE: Working — duration timer (count DOWN) for hold exercises
function wmRenderDuration(ex) {
  const totalSec = parseDurationFromReps(ex.reps) || 30;
  const wrap = wmFullCanvas(WM_PALETTE.working);
  wrap.appendChild(wmTopLabel('Hold · ' + ex.name, '#000'));

  const timeEl = el('div', {
    id: 'wm-dur-time',
    style: {
      fontFamily: "'Anton', 'Bebas Neue', sans-serif",
      fontSize: '160px', color: '#000',
      letterSpacing: '-0.02em', lineHeight: '1',
      WebkitTextStroke: '1px #000'
    }
  }, formatTimerDisplay(totalSec));
  wrap.appendChild(timeEl);

  wrap.appendChild(wmBottomLabel('Tap to pause  ·  hold to skip', '#000'));

  const update = () => {
    if (!wmState || wmState.phase !== 'working-duration') return;
    if (wmState.pausedAt) return;
    const remainMs = wmState.holdEndTime - Date.now();
    const remain = Math.max(0, Math.ceil(remainMs / 1000));
    if (timeEl) timeEl.textContent = formatTimerDisplay(remain);
    if (remain > 0 && remain <= 3 && !wmState['_holdBeeped' + remain]) {
      wmState['_holdBeeped' + remain] = true;
      playCountdownBlip();
    }
    if (remainMs <= 0) {
      wmState._lastSetDuration = totalSec;
      // Auto-commit duration set with no feedback prompt — just record and rest
      wmCommitSet(totalSec + ' sec', '', totalSec);
      wmAdvance();
    }
  };
  update();
  wmTickIntervalId = setInterval(update, 200);

  // Tap to pause; long-press to skip
  let pressTimer = null;
  wrap.addEventListener('pointerdown', (e) => {
    pressTimer = setTimeout(() => {
      pressTimer = null;
      // Long-press = skip remainder
      wmState._lastSetDuration = totalSec - Math.max(0, Math.ceil((wmState.holdEndTime - Date.now()) / 1000));
      wmCommitSet(wmState._lastSetDuration + ' sec', '', wmState._lastSetDuration);
      wmAdvance();
    }, 700);
  });
  wrap.addEventListener('pointerup', () => {
    if (pressTimer) {
      clearTimeout(pressTimer);
      pressTimer = null;
      wmTogglePause();
    }
  });
  wrap.addEventListener('pointercancel', () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } });
  return wrap;
}

// PHASE: Rest with reps + feedback input
function wmRenderRest(ex) {
  const isHold = !!parseDurationFromReps(ex.reps);
  const isLastSet = wmState.setIndex >= ex.sets - 1;
  const wrap = wmFullCanvas(WM_PALETTE.rest);
  wrap.appendChild(wmTopLabel('Rest', '#000'));

  const timeEl = el('div', {
    id: 'wm-rest-time',
    style: {
      fontFamily: "'Anton', 'Bebas Neue', sans-serif",
      fontSize: '90px', color: '#000',
      letterSpacing: '-0.02em', lineHeight: '1',
      WebkitTextStroke: '1px #000',
      marginBottom: '14px'
    }
  }, '0:00');
  wrap.appendChild(timeEl);

  // Input panel — only for rolling weight exercises (hold exercises auto-committed already)
  if (!isHold) {
    const inputCard = div({
      background: 'rgba(0,0,0,0.08)',
      border: '1px solid rgba(0,0,0,0.18)',
      borderRadius: '12px',
      padding: '14px',
      width: '100%',
      maxWidth: '360px',
      margin: '0 auto'
    });

    inputCard.appendChild(el('div', {
      style: {fontSize:'8px',color:'#000',opacity:'0.7',letterSpacing:'0.22em',textTransform:'uppercase',marginBottom:'6px',fontWeight:'700'}
    }, 'Reps Completed'));

    // Reps stepper
    const repsRow = div({display:'flex',alignItems:'center',gap:'10px',justifyContent:'center',marginBottom:'10px'});
    const mkStepBtn = (label, delta) => el('button', {
      class:'btn',
      style:{background:'#000',color:WM_PALETTE.rest,border:'none',width:'44px',height:'44px',borderRadius:'8px',fontFamily:"'DM Mono',monospace",fontSize:'18px',cursor:'pointer',fontWeight:'700'},
      onclick: (e) => {
        e.stopPropagation();
        const cur = parseInt(wmState.pendingReps || '0', 10);
        wmState.pendingReps = Math.max(0, cur + delta) + '';
        document.getElementById('wm-reps-display').textContent = wmState.pendingReps;
      }
    }, label);
    repsRow.appendChild(mkStepBtn('−', -1));
    repsRow.appendChild(el('div', {
      id: 'wm-reps-display',
      style: {fontFamily:"'Anton', sans-serif",fontSize:'42px',color:'#000',minWidth:'60px',textAlign:'center',lineHeight:'1'}
    }, wmState.pendingReps || '0'));
    repsRow.appendChild(mkStepBtn('+', 1));
    inputCard.appendChild(repsRow);

    // Quick reps shortcuts
    const repsSpec = parseRepsSpec(ex.reps);
    if (repsSpec && !repsSpec.isMax && !repsSpec.isTime) {
      const shortcutsRow = div({display:'flex',gap:'6px',justifyContent:'center',marginBottom:'10px',flexWrap:'wrap'});
      const targets = [];
      if (repsSpec.min) targets.push(repsSpec.min);
      if (repsSpec.max && repsSpec.max !== repsSpec.min) targets.push(repsSpec.max);
      targets.forEach(n => {
        const b = el('button', {
          class: 'btn',
          style:{background:'rgba(0,0,0,0.15)',color:'#000',border:'1px solid rgba(0,0,0,0.25)',padding:'6px 12px',borderRadius:'14px',fontFamily:"'DM Mono',monospace",fontSize:'11px',cursor:'pointer',fontWeight:'700'},
          onclick: (e) => {
            e.stopPropagation();
            wmState.pendingReps = n + '';
            document.getElementById('wm-reps-display').textContent = wmState.pendingReps;
          }
        }, n + '');
        shortcutsRow.appendChild(b);
      });
      inputCard.appendChild(shortcutsRow);
    }

    // Feedback row
    inputCard.appendChild(el('div', {
      style: {fontSize:'8px',color:'#000',opacity:'0.7',letterSpacing:'0.22em',textTransform:'uppercase',marginBottom:'6px',fontWeight:'700'}
    }, 'How did it feel?'));
    const fbRow = div({display:'flex',gap:'6px',flexWrap:'wrap',justifyContent:'center',marginBottom: isLastSet ? '0' : '12px'});
    [
      {key:'easy',     label:'💚 Easy'},
      {key:'complete', label:'✓ Complete'},
      {key:'struggle', label:'⚠ Struggled'}
    ].forEach(opt => {
      const isActive = wmState.pendingFeedback === opt.key;
      const b = el('button', {
        class: 'btn',
        'data-fb': opt.key,
        style:{
          background: isActive ? '#000' : 'rgba(0,0,0,0.15)',
          color: isActive ? WM_PALETTE.rest : '#000',
          border: '1px solid rgba(0,0,0,0.3)',
          padding:'8px 12px', borderRadius:'14px',
          fontFamily:"'DM Mono',monospace", fontSize:'10px',
          cursor:'pointer', fontWeight:'700', letterSpacing:'0.05em'
        },
        onclick: (e) => {
          e.stopPropagation();
          wmState.pendingFeedback = opt.key;
          fbRow.querySelectorAll('[data-fb]').forEach(btn => {
            const k = btn.getAttribute('data-fb');
            const active = k === opt.key;
            btn.style.background = active ? '#000' : 'rgba(0,0,0,0.15)';
            btn.style.color = active ? WM_PALETTE.rest : '#000';
          });
        }
      }, opt.label);
      fbRow.appendChild(b);
    });
    inputCard.appendChild(fbRow);

    // INLINE WEIGHT ADJUSTER for next set — only if not the last set
    if (!isLastSet) {
      inputCard.appendChild(el('div', {
        style: {height:'1px',background:'rgba(0,0,0,0.15)',margin:'4px 0 12px'}
      }));
      inputCard.appendChild(el('div', {
        style: {fontSize:'8px',color:'#000',opacity:'0.7',letterSpacing:'0.22em',textTransform:'uppercase',marginBottom:'6px',fontWeight:'700'}
      }, 'Next Set Weight'));

      const weightRow = div({display:'flex',alignItems:'center',gap:'8px',justifyContent:'center',marginBottom:'8px'});
      const mkWtBtn = (label, delta) => el('button', {
        class:'btn',
        style:{background:'#000',color:WM_PALETTE.rest,border:'none',padding:'8px 11px',borderRadius:'8px',fontFamily:"'DM Mono',monospace",fontSize:'11px',cursor:'pointer',fontWeight:'700',minWidth:'46px'},
        onclick: (e) => {
          e.stopPropagation();
          wmState.currentWeight = Math.max(0, +(wmState.currentWeight + delta).toFixed(2));
          const d = document.getElementById('wm-rest-weight-display');
          if (d) d.textContent = wmState.currentWeight + '';
          wmPersist();
        }
      }, label);
      weightRow.appendChild(mkWtBtn('−5', -5));
      weightRow.appendChild(mkWtBtn('−2.5', -2.5));
      weightRow.appendChild(el('div', {
        id:'wm-rest-weight-display',
        style:{fontFamily:"'Anton',sans-serif",fontSize:'34px',color:'#000',minWidth:'70px',textAlign:'center',lineHeight:'1',padding:'0 4px'}
      }, wmState.currentWeight + ''));
      weightRow.appendChild(mkWtBtn('+2.5', 2.5));
      weightRow.appendChild(mkWtBtn('+5', 5));
      inputCard.appendChild(weightRow);

      // Bigger increments on a second row
      const bigRow = div({display:'flex',gap:'6px',justifyContent:'center'});
      const mkBigBtn = (label, delta) => el('button', {
        class:'btn',
        style:{background:'rgba(0,0,0,0.12)',color:'#000',border:'1px solid rgba(0,0,0,0.25)',padding:'6px 10px',borderRadius:'12px',fontFamily:"'DM Mono',monospace",fontSize:'10px',cursor:'pointer',fontWeight:'700'},
        onclick: (e) => {
          e.stopPropagation();
          wmState.currentWeight = Math.max(0, +(wmState.currentWeight + delta).toFixed(2));
          const d = document.getElementById('wm-rest-weight-display');
          if (d) d.textContent = wmState.currentWeight + '';
          wmPersist();
        }
      }, label);
      bigRow.appendChild(mkBigBtn('−10', -10));
      bigRow.appendChild(mkBigBtn('−1.25', -1.25));
      bigRow.appendChild(mkBigBtn('+1.25', 1.25));
      bigRow.appendChild(mkBigBtn('+10', 10));
      inputCard.appendChild(bigRow);
    }

    wrap.appendChild(inputCard);
  }

  // Primary action button — adapts based on rest timer state
  const actionBtn = el('button', {
    id: 'wm-rest-action-btn',
    class: 'btn',
    style: {
      marginTop: '16px', background:'#000', color:WM_PALETTE.rest,
      border:'none', padding:'14px 28px', borderRadius:'10px',
      fontFamily:"'DM Mono',monospace", fontSize:'12px',
      letterSpacing:'0.2em', textTransform:'uppercase',
      cursor:'pointer', fontWeight:'700',
      transition:'all 0.3s ease'
    },
    onclick: (e) => {
      e.stopPropagation();
      wmCommitRestPhase(ex, isHold);
      wmAdvance();
    }
  }, isLastSet ? 'Finish Exercise →' : 'Start Next Set →');
  wrap.appendChild(actionBtn);

  // Tick — does NOT auto-advance. When timer hits 0, pulses the action button
  // and shows "ready when you are" state.
  const update = () => {
    if (!wmState || wmState.phase !== 'rest') return;
    if (wmState.pausedAt) return;
    const remainMs = wmState.restEndTime - Date.now();
    const remain = Math.max(0, Math.ceil(remainMs / 1000));
    if (timeEl) {
      if (remainMs > 0) {
        timeEl.textContent = formatTimerDisplay(remain);
      } else {
        timeEl.textContent = 'READY';
        timeEl.style.fontSize = '64px';
      }
    }
    if (remain > 0 && remain <= 3 && !wmState['_restBeeped' + remain]) {
      wmState['_restBeeped' + remain] = true;
      playCountdownBlip();
    }
    if (remainMs <= 0 && !wmState._restEndTone) {
      wmState._restEndTone = true;
      playStartTone();
      // Pulse the action button to draw attention
      const btn = document.getElementById('wm-rest-action-btn');
      if (btn) {
        btn.style.transform = 'scale(1.05)';
        btn.style.boxShadow = '0 0 0 4px rgba(0,0,0,0.15)';
        const labelText = isLastSet ? 'Finish Exercise →' : 'Start Next Set →';
        btn.textContent = labelText;
      }
    }
  };
  update();
  wmTickIntervalId = setInterval(update, 200);
  return wrap;
}

function wmCommitRestPhase(ex, isHold) {
  if (isHold) return; // hold sets already committed in duration phase
  const reps = parseInt(wmState.pendingReps || '0', 10);
  const fbMap = {
    easy: 'easy',
    complete: 'complete',
    struggle: 'struggled'
  };
  const fb = fbMap[wmState.pendingFeedback] || '';
  wmCommitSet(reps, fb, null);
  wmState.pendingReps = null;
  wmState.pendingFeedback = null;
}

// Edit a logged set in-place (called from summary screens). Updates both the
// session log and the underlying workout storage.
async function wmEditSet(exId, setIdx) {
  const day = PROGRAM[activeDay];
  const sets = wmState.perExerciseLogs[exId] || [];
  const s = sets[setIdx];
  if (!s) return;

  const ex = day.exercises.find(e => e.id === exId);
  const isHold = ex ? !!parseDurationFromReps(ex.reps) : false;

  // Build a custom edit modal — promise-based, returns updated values or null on cancel
  const result = await new Promise((resolve) => {
    const overlay = el('div', {
      style: {
        position:'fixed', top:'0', left:'0', right:'0', bottom:'0',
        background:'rgba(0,0,0,0.75)',
        display:'flex', alignItems:'center', justifyContent:'center',
        zIndex:'10001', padding:'20px'
      }
    });
    const modal = el('div', {
      style:{
        background:'#0e0e0e', border:'1px solid #2a2a2a',
        borderRadius:'14px', padding:'20px',
        maxWidth:'340px', width:'100%',
        boxShadow:'0 12px 40px rgba(0,0,0,0.8)'
      }
    });
    modal.appendChild(el('div', {
      style:{fontSize:'8px',color:'#06d6a0',letterSpacing:'0.25em',textTransform:'uppercase',fontWeight:'700',marginBottom:'4px'}
    }, 'Edit Set ' + (setIdx + 1)));
    modal.appendChild(el('div', {
      style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:'22px',color:'#ebebeb',letterSpacing:'0.04em',marginBottom:'14px'}
    }, ex ? ex.name : 'Exercise'));

    // Weight input (skip if hold exercise — no weight)
    let weightInp = null;
    if (!isHold) {
      const wRow = div({marginBottom:'10px'});
      wRow.appendChild(el('div',{style:{fontSize:'9px',color:'#888',letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:'5px',fontWeight:'700'}},'Weight (kg)'));
      weightInp = el('input', {
        type:'number', step:'0.25', value: s.weight || '0',
        style:{width:'100%',background:'#080808',border:'1px solid #2a2a2a',color:'#ebebeb',padding:'10px 12px',borderRadius:'6px',fontFamily:"'DM Mono',monospace",fontSize:'14px',boxSizing:'border-box'}
      });
      wRow.appendChild(weightInp);
      modal.appendChild(wRow);
    }

    // Reps input
    const rRow = div({marginBottom:'12px'});
    rRow.appendChild(el('div',{style:{fontSize:'9px',color:'#888',letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:'5px',fontWeight:'700'}}, isHold ? 'Duration' : 'Reps'));
    const repsInp = el('input', {
      type:'text', value: s.reps || '',
      style:{width:'100%',background:'#080808',border:'1px solid #2a2a2a',color:'#ebebeb',padding:'10px 12px',borderRadius:'6px',fontFamily:"'DM Mono',monospace",fontSize:'14px',boxSizing:'border-box'}
    });
    rRow.appendChild(repsInp);
    modal.appendChild(rRow);

    // Feedback selector
    const fbWrap = div({marginBottom:'16px'});
    fbWrap.appendChild(el('div',{style:{fontSize:'9px',color:'#888',letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:'6px',fontWeight:'700'}},'Feedback'));
    const fbRow = div({display:'flex',gap:'5px',flexWrap:'wrap'});
    let selectedFb = s.note || '';
    [
      {key:'',         label:'None'},
      {key:'easy',     label:'💚 Easy'},
      {key:'complete', label:'✓ Complete'},
      {key:'struggled',label:'⚠ Struggled'}
    ].forEach(opt => {
      const b = el('button', {
        class:'btn',
        'data-fb': opt.key,
        style:{
          background: selectedFb === opt.key ? '#06d6a0' : 'transparent',
          color: selectedFb === opt.key ? '#000' : '#aaa',
          border:'1px solid ' + (selectedFb === opt.key ? '#06d6a0' : '#2a2a2a'),
          padding:'6px 10px', borderRadius:'12px',
          fontFamily:"'DM Mono',monospace", fontSize:'9px',
          letterSpacing:'0.05em', cursor:'pointer', fontWeight:'700'
        },
        onclick: (e) => {
          e.stopPropagation();
          selectedFb = opt.key;
          fbRow.querySelectorAll('[data-fb]').forEach(btn => {
            const k = btn.getAttribute('data-fb');
            const active = k === selectedFb;
            btn.style.background = active ? '#06d6a0' : 'transparent';
            btn.style.color = active ? '#000' : '#aaa';
            btn.style.borderColor = active ? '#06d6a0' : '#2a2a2a';
          });
        }
      }, opt.label);
      fbRow.appendChild(b);
    });
    fbWrap.appendChild(fbRow);
    modal.appendChild(fbWrap);

    // Buttons
    const btnRow = div({display:'flex',gap:'8px',justifyContent:'flex-end'});
    const cancelBtn = el('button', {
      class:'btn',
      style:{background:'transparent',color:'#888',border:'1px solid #2a2a2a',padding:'10px 14px',borderRadius:'6px',fontFamily:"'DM Mono',monospace",fontSize:'10px',letterSpacing:'0.12em',textTransform:'uppercase',cursor:'pointer'},
      onclick: (e) => { e.stopPropagation(); overlay.remove(); resolve(null); }
    }, 'Cancel');
    const saveBtn = el('button', {
      class:'btn',
      style:{background:'#06d6a0',color:'#000',border:'none',padding:'10px 16px',borderRadius:'6px',fontFamily:"'DM Mono',monospace",fontSize:'10px',letterSpacing:'0.12em',textTransform:'uppercase',cursor:'pointer',fontWeight:'700'},
      onclick: (e) => {
        e.stopPropagation();
        overlay.remove();
        resolve({
          weight: weightInp ? (weightInp.value || '0') : (s.weight || ''),
          reps: repsInp.value || '',
          note: selectedFb
        });
      }
    }, 'Save');
    btnRow.appendChild(cancelBtn);
    btnRow.appendChild(saveBtn);
    modal.appendChild(btnRow);

    overlay.appendChild(modal);
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) { overlay.remove(); resolve(null); }
    });
    document.body.appendChild(overlay);
  });

  if (!result) return;

  // Update session log only — storage flush is deferred until Finish Workout
  wmState.perExerciseLogs[exId][setIdx] = {
    ...s,
    weight: result.weight,
    reps: result.reps,
    note: result.note
  };
  wmPersist();
  wmRender();
}

// PHASE: Per-exercise summary
function wmRenderExerciseSummary(ex) {
  const wrap = div({});
  const sets = wmState.perExerciseLogs[ex.id] || [];
  const card = div({
    background:'rgba(255,255,255,0.45)', border:'1px solid rgba(0,0,0,0.12)',
    borderRadius:'12px', padding:'18px', marginBottom:'18px'
  });
  card.appendChild(el('div', {
    style:{fontSize:'8px',color:'rgba(0,0,0,0.7)',letterSpacing:'0.25em',textTransform:'uppercase',marginBottom:'6px',fontWeight:'700'}
  }, 'Exercise Complete · Tap to Edit'));
  card.appendChild(el('div', {
    style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:'28px',color:'#000',letterSpacing:'0.04em',marginBottom:'14px'}
  }, ex.name));

  sets.forEach((s, i) => {
    if (!s) return;
    const row = el('button', {
      class: 'btn',
      style: {
        display:'flex', justifyContent:'space-between', alignItems:'center',
        padding:'12px 0', width:'100%',
        background:'transparent', border:'none', cursor:'pointer',
        borderBottom: i < sets.length - 1 ? '1px solid rgba(0,0,0,0.1)' : 'none',
        textAlign:'left'
      },
      onclick: (e) => { e.stopPropagation(); wmEditSet(ex.id, i); }
    });
    row.appendChild(el('div', {style:{fontSize:'10px',color:'rgba(0,0,0,0.65)',fontFamily:"'DM Mono',monospace",fontWeight:'700'}}, 'Set ' + (i+1) + '  ✎'));
    const valRow = div({display:'flex',gap:'10px',alignItems:'center'});
    if (s.weight && parseFloat(s.weight) > 0) {
      valRow.appendChild(el('div', {style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:'20px',color:'#000',letterSpacing:'0.04em'}}, s.weight + 'kg'));
      valRow.appendChild(el('div', {style:{color:'rgba(0,0,0,0.4)',fontSize:'12px'}}, '×'));
    }
    valRow.appendChild(el('div', {style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:'20px',color:'#000',letterSpacing:'0.04em'}}, s.reps));
    if (s.note) {
      const fbColor = s.note === 'easy' ? 'rgba(0,90,0,0.85)' : (s.note === 'struggled' ? 'rgba(150,60,0,0.9)' : 'rgba(0,0,0,0.7)');
      valRow.appendChild(el('div', {style:{fontSize:'9px',color:fbColor,letterSpacing:'0.12em',textTransform:'uppercase',fontFamily:"'DM Mono',monospace",fontWeight:'700'}}, s.note));
    }
    row.appendChild(valRow);
    card.appendChild(row);
  });
  wrap.appendChild(card);

  const day = PROGRAM[activeDay];
  const isLast = wmState.exIndex >= day.exercises.length - 1;
  const btn = wmBigButton(isLast ? 'Finish Workout →' : 'Next Exercise →', '#000', WM_PALETTE.prep, () => wmAdvance());
  wrap.appendChild(btn);
  return wrap;
}

// PHASE: Final workout summary
function wmRenderWorkoutSummary(day) {
  const wrap = div({});
  const card = div({
    background:'rgba(255,255,255,0.45)', border:'1px solid rgba(0,0,0,0.15)',
    borderRadius:'12px', padding:'20px', marginBottom:'18px'
  });
  card.appendChild(el('div', {
    style:{fontSize:'8px',color:'rgba(0,0,0,0.55)',letterSpacing:'0.28em',textTransform:'uppercase',marginBottom:'6px',fontWeight:'700'}
  }, 'Workout Complete'));
  card.appendChild(el('div', {
    style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:'40px',color:'#000',letterSpacing:'0.04em',marginBottom:'14px',lineHeight:'1'}
  }, day.title));

  // Totals
  const totalSec = Math.round((Date.now() - wmState.sessionStartTime) / 1000);
  let totalSets = 0;
  let totalVolume = 0;
  Object.keys(wmState.perExerciseLogs).forEach(exId => {
    const sets = wmState.perExerciseLogs[exId] || [];
    sets.forEach(s => {
      if (!s) return;
      totalSets++;
      const w = parseFloat(s.weight) || 0;
      const r = parseInt(s.reps, 10) || 0;
      if (w > 0 && r > 0) totalVolume += w * r;
    });
  });

  const stats = div({display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'10px',marginBottom:'18px'});
  const stat = (label, val, unit) => {
    const d = div({background:'rgba(0,0,0,0.06)',border:'1px solid rgba(0,0,0,0.15)',borderRadius:'8px',padding:'10px',textAlign:'center'});
    d.appendChild(el('div',{style:{fontSize:'7px',color:'rgba(0,0,0,0.55)',letterSpacing:'0.2em',textTransform:'uppercase',marginBottom:'4px',fontWeight:'700'}},label));
    d.appendChild(el('div',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:'24px',color:'#000'}},val));
    if (unit) d.appendChild(el('div',{style:{fontSize:'8px',color:'rgba(0,0,0,0.5)',marginTop:'2px',fontFamily:"'DM Mono',monospace",fontWeight:'700'}},unit));
    return d;
  };
  const mins = Math.floor(totalSec / 60);
  const secs = totalSec % 60;
  stats.appendChild(stat('Time', mins + ':' + (secs < 10 ? '0' + secs : secs), null));
  stats.appendChild(stat('Sets', totalSets + '', null));
  stats.appendChild(stat('Volume', totalVolume.toFixed(0), 'kg'));
  card.appendChild(stats);

  // ── ANIMAL EQUIVALENT CARD ────────────────────────────────────────────────
  if (totalVolume > 0) {
    const eq = animalEquivalent(totalVolume);
    if (eq) {
      const animalCard = div({
        background:'rgba(255,255,255,0.55)',
        border:'1px solid rgba(0,0,0,0.18)',
        borderRadius:'14px',
        padding:'18px 16px',
        marginBottom:'14px',
        textAlign:'center',
        position:'relative',
        overflow:'hidden'
      });
      // Soft accent gradient backdrop for the card
      animalCard.appendChild(el('div', {
        style:{
          position:'absolute', top:'0',left:'0',right:'0',bottom:'0',
          background:'radial-gradient(ellipse at center, rgba(0,0,0,0.04), transparent 70%)',
          pointerEvents:'none'
        }
      }));
      const inner = div({position:'relative',zIndex:'1'});
      inner.appendChild(el('div', {
        style:{fontSize:'8px',color:'rgba(0,0,0,0.7)',letterSpacing:'0.28em',textTransform:'uppercase',fontWeight:'700',marginBottom:'8px'}
      }, 'You Lifted The Equivalent Of'));
      // Big emoji centerpiece with subtle drop animation
      const emojiEl = el('div', {
        id: 'wm-animal-emoji',
        style:{
          fontSize:'88px',
          lineHeight:'1',
          marginBottom:'6px',
          opacity:'0',
          transform:'translateY(-12px) scale(0.85)',
          transition:'opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)'
        }
      }, eq.animal.emoji);
      inner.appendChild(emojiEl);
      requestAnimationFrame(() => {
        setTimeout(() => {
          if (emojiEl) {
            emojiEl.style.opacity = '1';
            emojiEl.style.transform = 'translateY(0) scale(1)';
          }
        }, 200);
      });
      // Count + animal label
      const countLine = div({display:'flex',justifyContent:'center',alignItems:'baseline',gap:'10px',marginBottom:'4px',flexWrap:'wrap'});
      countLine.appendChild(el('span', {
        style:{fontFamily:"'Anton','Bebas Neue',sans-serif",fontSize:'52px',color:'#000',letterSpacing:'-0.01em',lineHeight:'1',WebkitTextStroke:'1px #000'}
      }, eq.count + ''));
      countLine.appendChild(el('span', {
        style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:'24px',color:'#000',letterSpacing:'0.04em'}
      }, eq.count === 1 ? eq.animal.singular : eq.animal.name));
      inner.appendChild(countLine);
      // Volume context
      inner.appendChild(el('div', {
        style:{fontSize:'9px',color:'rgba(0,0,0,0.6)',fontFamily:"'DM Mono',monospace",letterSpacing:'0.1em',marginTop:'4px',fontWeight:'700'}
      }, totalVolume.toFixed(0) + ' kg total · ~' + eq.animal.kg + ' kg each'));
      animalCard.appendChild(inner);
      wrap.appendChild(animalCard);
    }
  }

// ─── PAUSE / RESUME ───────────────────────────────────────────────────────────

function wmTogglePause() {
  if (!wmState) return;
  if (wmState.pausedAt) {
    // Resume — shift all relevant end-times forward by the pause duration
    const pauseDur = Date.now() - wmState.pausedAt;
    if (wmState.countdownEndTime) wmState.countdownEndTime += pauseDur;
    if (wmState.holdEndTime) wmState.holdEndTime += pauseDur;
    if (wmState.restEndTime) wmState.restEndTime += pauseDur;
    if (wmState.workingStartTime) wmState.workingStartTime += pauseDur;
    wmState.pausedAt = null;
    wmPersist();
    wmRender();
  } else {
    wmState.pausedAt = Date.now();
    wmPersist();
    // Show paused overlay
    if (wmTickIntervalId) clearInterval(wmTickIntervalId);
    const overlay = document.getElementById('wm-overlay');
    if (overlay) {
      const pausedBadge = el('div', {
        id: 'wm-paused-badge',
        style: {
          position:'absolute', top:'50%', left:'50%',
          transform:'translate(-50%, -50%)',
          background: 'rgba(0,0,0,0.85)', color:'#fff',
          padding:'18px 24px', borderRadius:'12px',
          fontFamily:"'DM Mono',monospace", fontSize:'12px',
          letterSpacing:'0.25em', textTransform:'uppercase', fontWeight:'700',
          zIndex:'20', cursor:'pointer'
        },
        onclick: (e) => { e.stopPropagation(); wmTogglePause(); }
      }, 'Paused · Tap to resume');
      overlay.appendChild(pausedBadge);
    }
  }
}
