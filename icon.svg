<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#080808"/>
  <!-- Inner accent ring -->
  <rect x="20" y="20" width="472" height="472" rx="84" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Geometric F: vertical bar + two horizontal strokes -->
  <g fill="#3bdfff">
    <!-- Vertical stem -->
    <rect x="138" y="116" width="48" height="280" rx="4"/>
    <!-- Top horizontal -->
    <rect x="138" y="116" width="236" height="48" rx="4"/>
    <!-- Middle horizontal -->
    <rect x="138" y="232" width="180" height="42" rx="4"/>
  </g>
  <!-- Bottom accent line in green (echoes progression UI) -->
  <rect x="138" y="416" width="80" height="6" rx="3" fill="#6aff3b"/>
  <rect x="232" y="416" width="40" height="6" rx="3" fill="#fbbf24"/>
</svg>
